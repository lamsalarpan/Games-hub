<script src="assets/js/common.js"></script>
<script>
  // Starfield
  (function () {
    const field = document.getElementById('starfield');
    const count = window.innerWidth < 720 ? 60 : 120;
    const frag = document.createDocumentFragment();
    for (let i = 0; i < count; i++) {
      const s = document.createElement('span');
      s.style.left = Math.random() * 100 + '%';
      s.style.top = Math.random() * 100 + '%';
      s.style.animationDelay = (Math.random() * 5).toFixed(2) + 's';
      s.style.animationDuration = (4 + Math.random() * 4).toFixed(2) + 's';
      frag.appendChild(s);
    }
    field.appendChild(frag);
  })();

  // Per-game mini gameplay preview markup + a difficulty→dot count map,
  // keyed by the same ids used in Arcade.GAMES (single source of truth).
  const PREVIEWS = {
    flappy: `<div class="pipe pA"></div><div class="pipe pA top"></div><div class="pipe pB"></div><div class="pipe pB top"></div><div class="bird"></div>`,
    dino: `<div class="ground"></div><div class="dino"></div><div class="cactus c1"></div><div class="cactus c2"></div>`,
    tictactoe: `<div class="board">
        <div><span class="mark x1">×</span></div><div></div><div></div>
        <div></div><div><span class="mark o1">○</span></div><div></div>
        <div></div><div></div><div><span class="mark x3">×</span></div>
      </div><div class="winline"></div>`,
    roadfighter: `<div class="lane"></div><div class="rival r1"></div><div class="rival r2"></div><div class="car"></div>`,
    snake: `<div class="seg s1"></div><div class="seg s2"></div><div class="seg s3"></div><div class="seg s4"></div><div class="food"></div>`,
    stacktower: `<div class="tower"><div class="tblock b1"></div><div class="tblock b2"></div><div class="tblock b3"></div></div><div class="mover"></div>`
  };
  const PREVIEW_CLASS = { flappy: 'p-flappy', dino: 'p-dino', tictactoe: 'p-ttt', roadfighter: 'p-road', snake: 'p-snake', stacktower: 'p-stacktower' };
  const DOTS_BY_DIFFICULTY = { Easy: 1, Medium: 2, Hard: 3 };

  function heartIcon(filled) {
    return `<svg viewBox="0 0 24 24" fill="${filled ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2"><path d="M12 21s-7.5-4.6-10-9.3C.3 8.4 2 5 5.4 5c2 0 3.4 1.1 4.6 2.7C11.2 6.1 12.6 5 14.6 5 18 5 19.7 8.4 18 11.7 15.5 16.4 12 21 12 21Z"/></svg>`;
  }

  let currentFilter = 'all';

  function applyFilter() {
    const cards = document.querySelectorAll('#arcade .cart');
    let visibleCount = 0;
    cards.forEach(c => {
      const show = currentFilter === 'all' || (currentFilter === 'favorites' && Arcade.isFavorite(c.dataset.gameId));
      c.style.display = show ? '' : 'none';
      if (show) visibleCount++;
    });
    let empty = document.querySelector('.filter-empty');
    if (visibleCount === 0) {
      if (!empty) {
        empty = document.createElement('div');
        empty.className = 'filter-empty';
        empty.textContent = 'No favorites yet — tap the heart on a cartridge to pin it here.';
        document.getElementById('arcade').appendChild(empty);
      }
    } else if (empty) {
      empty.remove();
    }
  }

  document.querySelectorAll('.filter-pill').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-pill').forEach(b => { b.classList.remove('active'); b.setAttribute('aria-selected', 'false'); });
      btn.classList.add('active'); btn.setAttribute('aria-selected', 'true');
      currentFilter = btn.dataset.filter;
      applyFilter();
    });
  });

  function renderArcade() {
    const wrap = document.getElementById('arcade');
    const on = DOTS_BY_DIFFICULTY;
    wrap.innerHTML = Arcade.GAMES.map((g, i) => {
      const dotCount = on[g.difficulty] || 2;
      const dots = [0, 1, 2].map(d => `<span${d < dotCount ? ' class="on"' : ''}></span>`).join('');
      const fav = Arcade.isFavorite(g.id);
      const code = String(i + 1).padStart(2, '0');
      return `
        <a class="cart" href="${g.href}" data-game-id="${g.id}">
          <div class="cart-plate">
            <div class="cart-plate-left">
              <button type="button" class="cart-fav${fav ? ' active' : ''}" data-fav="${g.id}" aria-label="Toggle favorite">${heartIcon(fav)}</button>
              <span class="cart-code">CART.&nbsp;${code}</span>
            </div>
            <span class="cart-genre">${g.category}</span>
          </div>
          <div class="screen ${PREVIEW_CLASS[g.id] || ''}">${PREVIEWS[g.id] || ''}</div>
          <div class="cart-body">
            <h3>${g.title}</h3>
            <p>${g.desc}</p>
            <div class="cart-foot">
              <div class="dots">${dots}</div>
              <span class="play-btn">Play <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>
            </div>
          </div>
        </a>`;
    }).join('');

    // Favorite toggle — stop the click reaching the card's own <a> link.
    wrap.querySelectorAll('[data-fav]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.preventDefault(); e.stopPropagation();
        const id = btn.getAttribute('data-fav');
        const nowFav = Arcade.toggleFavorite(id);
        btn.classList.toggle('active', nowFav);
        btn.innerHTML = heartIcon(nowFav);
        applyFilter();
      });
    });

    // Reveal cartridges on scroll
    const cards = wrap.querySelectorAll('.cart');
    const io = new IntersectionObserver((entries) => {
      entries.forEach((entry, i) => {
        if (entry.isIntersecting) {
          setTimeout(() => entry.target.classList.add('visible'), i * 70);
          io.unobserve(entry.target);
        }
      });
    }, { threshold: 0.15, rootMargin: '0px 0px -6% 0px' });
    cards.forEach(c => io.observe(c));
    applyFilter();
  }
  renderArcade();

  // Personalize the hero once a profile exists.
  (function personalize() {
    const p = Arcade.getProfile();
    if (p && p.username && p.username !== 'Player One') {
      document.getElementById('heroEyebrow').textContent = 'Welcome back, ' + p.username;
    }
  })();
  window.addEventListener('arcade:profile', function (e) {
    document.getElementById('heroEyebrow').textContent = 'Welcome back, ' + e.detail.username;
  });

  // Nav Profile / Stats / Settings buttons + panels (shared across every page).
  Arcade.mountPanels();

  // Offline / PWA
  document.getElementById('offlineBtn').addEventListener('click', function () {
    Arcade.registerServiceWorker('sw.js').then(function (reg) {
      if (reg) { Arcade.unlock('offline_ready', 'Off The Grid', 'Save the hub for offline play'); Arcade.toast('Saved — the hub now works offline.'); }
      else Arcade.toast('Offline support isn\u2019t available in this browser.');
    });
  });

  document.getElementById('year').textContent = new Date().getFullYear();
</script>
