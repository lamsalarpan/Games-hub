<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Flappy Bird — Arpan Lamsal</title>
<meta name="description" content="A Flappy Bird clone built by Arpan Lamsal, styled to match his portfolio.">

<link rel="icon" href="../faviconset/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="16x16" href="../faviconset/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="../faviconset/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="192x192" href="../faviconset/android-chrome-192x192.png">
<link rel="apple-touch-icon" sizes="180x180" href="../faviconset/apple-touch-icon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../assets/css/theme.css">
<style>
  html,body{ height:100%; }
  body::before{
    content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
    background:radial-gradient(60% 50% at 50% 38%, rgba(232,181,90,0.09), transparent 70%);
  }
  .stage-wrap{ position:relative; z-index:1; }
  html,body{
    height:100%;
    overflow:hidden;
    touch-action:none;
    overscroll-behavior:none;
    -webkit-user-select:none; user-select:none;
  }

  /* ---- Game stage (flappy-specific canvas sizing/frame) ---- */
  .stage-wrap{
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    padding-top:var(--nav-h);
  }
  #game{
    display:block;
    background:linear-gradient(180deg, #0c0c0b 0%, #14140f 55%, #1a1710 100%);
    border:1px solid var(--border-strong);
    border-radius:4px;
    box-shadow:0 40px 100px rgba(0,0,0,0.55);
    touch-action:none;
  }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-left">
    <a href="https://arpanlamsal.com.np" class="nav-logo" aria-label="Arpan Lamsal — Home">
      <img src="../faviconset/logo.png" alt="Arpan Lamsal logo">
      <span class="nav-title">Flappy Bird</span>
    </a>
    <a href="../index.html" class="nav-home-btn" aria-label="Back to Game Hub">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      <span>Hub</span>
    </a>
  </div>
</nav>

<div class="hud">
  <div class="score mono" id="score">0</div>
</div>

<div class="stage-wrap">
  <canvas id="game"></canvas>
</div>

<!-- Start overlay -->
<div class="overlay show" id="startOverlay">
  <div class="panel">
    <img class="mark" src="../faviconset/logo.png" alt="">
    <h1>Choose your flight.</h1>
    <div class="sub">Space · Click · Tap</div>
    <div class="option-list" id="diffRow">
      <button type="button" class="option-btn" data-diff="easy">
        <div class="opt-title">Easy</div>
        <div class="opt-desc">Wider gaps, gentler pace. A relaxed flap.</div>
      </button>
      <button type="button" class="option-btn" data-diff="medium">
        <div class="opt-title">Medium</div>
        <div class="opt-desc">The standard run. Balanced gaps and speed.</div>
      </button>
      <button type="button" class="option-btn" data-diff="hard">
        <div class="opt-title">Hard</div>
        <div class="opt-desc">Tight gaps, quick pipes. Ramps up fast.</div>
      </button>
    </div>
    <div class="stat-row"><span>Best Score <span id="startBestDiff" class="mono" style="color:var(--text-muted); font-size:10px;"></span></span><b id="startBest">0</b></div>
    <div class="hint">Guide the bird through the gaps.<br>Don't touch the pipes or the ground.</div>
  </div>
</div>

<!-- Game over overlay -->
<div class="overlay" id="overOverlay">
  <div class="panel">
    <h1>Game over.</h1>
    <div class="sub">It never gets easier — only more familiar</div>
    <div class="stat-row"><span>Score</span><b id="finalScore">0</b></div>
    <div class="stat-row"><span>Best <span id="finalBestDiff" class="mono" style="color:var(--text-muted); font-size:10px;"></span></span><b id="finalBest">0</b></div>
    <span class="new-best" id="newBestTag">New Best</span>
    <button type="button" class="btn-primary" id="retryBtn">Play Again</button>
    <a class="btn-secondary" id="homeBtn" href="../index.html">Back to Home</a>
    <div class="hint">Space · Click · Tap to retry</div>
  </div>
</div>

<script src="../assets/js/common.js"></script>
<script>
(function(){
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d', { alpha: false, desynchronized: true });

  const GOLD = '#c8973a';
  const GOLD_LIGHT = '#e8b55a';
  const GOLD_DARK = '#9c7328';
  const BORDER = 'rgba(255,255,255,0.13)';
  const TEXT_MUTED = '#505050';

  // Coarse-pointer (touch) devices get a lower pixel-ratio cap. Rendering
  // fewer physical pixels is by far the biggest lever for smooth mobile
  // performance, and the visual difference is negligible on a phone screen.
  const IS_COARSE = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
  const DPR_CAP = IS_COARSE ? 1.5 : 2;

  let W, H, DPR;
  let skyGradient = null;
  function viewportH(){
    return window.visualViewport ? window.visualViewport.height : window.innerHeight;
  }
  function resize(){
    DPR = Math.min(window.devicePixelRatio || 1, DPR_CAP);
    const maxW = Math.min(window.innerWidth * 0.94, 480);
    const maxH = viewportH() - 64 - 24;
    let w = maxW, h = w * (16/9.5);
    if (h > maxH){ h = maxH; w = h * (9.5/16); }
    W = Math.round(w); H = Math.round(h);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    ctx.setTransform(DPR,0,0,DPR,0,0);
    if (bird) bird.size = Math.max(30, W*0.09);
    skyGradient = ctx.createLinearGradient(0,0,0,H);
    skyGradient.addColorStop(0, '#0c0c0b');
    skyGradient.addColorStop(0.6, '#14140f');
    skyGradient.addColorStop(1, '#1a1710');
  }
  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', () => setTimeout(resize, 50));
  if (window.visualViewport) window.visualViewport.addEventListener('resize', resize);

  const STORAGE_KEY = 'flappy_al_best';
  const DIFF_KEY = 'flappy_al_difficulty';
  let difficulty = localStorage.getItem(DIFF_KEY) || 'medium';
  function bestKey(){ return STORAGE_KEY + '_' + difficulty; }
  let best = 0;
  function diffLabel(){ return '(' + difficulty.charAt(0).toUpperCase() + difficulty.slice(1) + ')'; }
  function refreshBest(){
    best = parseInt(localStorage.getItem(bestKey()) || '0', 10);
    document.getElementById('startBest').textContent = best;
    document.getElementById('startBestDiff').textContent = diffLabel();
  }
  refreshBest();

  let state = 'start';
  let bird, pipes, score, frame, groundOffset;
  let stars = [];

  resize();

  function initStars(){
    stars = [];
    const count = IS_COARSE ? 22 : 40;
    for(let i=0;i<count;i++){
      const a = Math.random()*0.5+0.15;
      stars.push({
        x: Math.random()*W, y: Math.random()*H*0.7,
        r: Math.random()*1.4+0.3, color: `rgba(240,237,230,${a.toFixed(2)})`
      });
    }
  }

  function reset(){
    bird = {
      x: W*0.3, y: H*0.42, vy: 0,
      size: Math.max(30, W*0.09),
      rot: 0,
      wing: 0,
      flapKick: 0
    };
    pipes = [];
    score = 0;
    frame = 0;
    groundOffset = 0;
    document.getElementById('score').textContent = '0';
    initStars();
  }

  function gravity(){ return 0.45 * (H/700); }
  function flapForce(){ return -8 * (H/700); }
  function pipeGapBase(){ return Math.max(150, H*0.26); }
  function pipeGapMin(){ return Math.max(112, H*0.195); }
  function pipeWidth(){ return Math.max(50, W*0.15); }
  function groundH(){ return Math.max(40, H*0.07); }
  function pipeSpeedBase(){ return 2.6 * (W/380); }
  const PIPE_INTERVAL_BASE = 100;
  const DIFFICULTY_START = 20;
  const DIFFICULTY_SPAN  = 22;

  // Three selectable tiers layered on top of the score-based ramp above —
  // Hard starts with a smaller gap and faster pipes, and also ramps harder.
  const DIFFICULTY_PRESETS = {
    easy:   { gapMul: 1.14, speedMul: 0.85, rampMul: 0.72 },
    medium: { gapMul: 1.00, speedMul: 1.02, rampMul: 1.05 },
    hard:   { gapMul: 0.85, speedMul: 1.24, rampMul: 1.48 },
  };
  function preset(){ return DIFFICULTY_PRESETS[difficulty] || DIFFICULTY_PRESETS.medium; }

  function difficultyT(){
    return Math.max(0, Math.min(1, (score - DIFFICULTY_START) / DIFFICULTY_SPAN)) * preset().rampMul;
  }
  function currentGap(){
    const t = Math.min(1, difficultyT());
    const base = pipeGapBase() * preset().gapMul;
    const min = pipeGapMin() * preset().gapMul;
    return base - t * (base - min);
  }
  function currentSpeed(){
    const t = Math.min(1, difficultyT());
    return pipeSpeedBase() * preset().speedMul * (1 + t * 0.55);
  }
  function currentInterval(){
    const t = Math.min(1, difficultyT());
    return Math.round(PIPE_INTERVAL_BASE * (1 - t * 0.18));
  }

  function flap(){
    if (state === 'over'){
      startGame();
      return;
    }
    if (state !== 'playing') return;
    bird.vy = flapForce();
    bird.flapKick = 1;
    sfxFlap();
  }

  function startGame(diff){
    if (diff){ difficulty = diff; localStorage.setItem(DIFF_KEY, diff); }
    refreshBest();
    reset();
    state = 'playing';
    document.getElementById('startOverlay').classList.remove('show');
    document.getElementById('overOverlay').classList.remove('show');
    document.getElementById('score').classList.add('show');
    bird.vy = flapForce() * 0.7;
  }

  function endGame(){
    state = 'over';
    sfxHit();
    document.getElementById('score').classList.remove('show');
    const isNewBest = score > best;
    if (isNewBest){ best = score; localStorage.setItem(bestKey(), String(best)); }
    document.getElementById('finalScore').textContent = score;
    document.getElementById('finalBest').textContent = best;
    document.getElementById('finalBestDiff').textContent = diffLabel();
    document.getElementById('newBestTag').classList.toggle('show', isNewBest);
    document.getElementById('overOverlay').classList.add('show');
    if (isNewBest) { Arcade.celebrate(); Arcade.celebrateHaptic(); }
    Arcade.logRun('flappy', score, difficulty);
    if (score >= 10) Arcade.unlock('flappy_10', 'Pipe Dream', 'Score 10 in Flappy Bird');
    if (score >= 30) Arcade.unlock('flappy_30', 'Sky Master', 'Score 30 in Flappy Bird');
  }

  function spawnPipe(){
    const gap = currentGap();
    const pw = pipeWidth();
    const gh = groundH();
    const margin = 40;
    const topH = margin + Math.random() * (H - gh - gap - margin*2);
    pipes.push({ x: W + pw, topH, gap, passed:false });
  }

  function roundRect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  let _pipeGradCache = null, _pipeGradW = -1;
  function getPipeGradient(pw){
    if (_pipeGradCache && _pipeGradW === pw) return _pipeGradCache;
    const grad = ctx.createLinearGradient(0,0,pw,0);
    grad.addColorStop(0, '#1a1712');
    grad.addColorStop(0.5, '#232019');
    grad.addColorStop(1, '#1a1712');
    _pipeGradCache = grad;
    _pipeGradW = pw;
    return grad;
  }

  function drawPipe(p){
    const r = 6;
    const pw = pipeWidth();
    const gh = groundH();
    const grad = getPipeGradient(pw);

    ctx.save();
    ctx.translate(p.x, 0);
    ctx.fillStyle = grad;
    roundRect(0, 0, pw, p.topH, r);
    ctx.fill();
    ctx.strokeStyle = GOLD; ctx.lineWidth = 1.5;
    ctx.stroke();

    const bottomY = p.topH + p.gap;
    roundRect(0, bottomY, pw, H - gh - bottomY, r);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.stroke();
    ctx.restore();

    ctx.fillStyle = GOLD;
    ctx.fillRect(p.x-3, p.topH-10, pw+6, 6);
    ctx.fillRect(p.x-3, bottomY+4, pw+6, 6);
  }

  let _birdGradCache = null, _birdGradSize = -1;
  function getBirdGradient(s){
    if (_birdGradCache && _birdGradSize === s) return _birdGradCache;
    const grad = ctx.createLinearGradient(-s*0.5, -s*0.5, s*0.5, s*0.5);
    grad.addColorStop(0, GOLD_LIGHT);
    grad.addColorStop(1, GOLD);
    _birdGradCache = grad;
    _birdGradSize = s;
    return grad;
  }

  function drawBird(){
    const s = bird.size;
    ctx.save();
    ctx.translate(bird.x, bird.y);
    ctx.rotate(bird.rot);

    bird.flapKick *= 0.90;
    const idle = Math.sin(frame * 0.18) * 0.12;
    const wingAngle = -0.55 - bird.flapKick * 0.9 + idle;

    ctx.fillStyle = GOLD_DARK;
    ctx.beginPath();
    ctx.moveTo(-s*0.42, -s*0.02);
    ctx.lineTo(-s*0.68, -s*0.16);
    ctx.lineTo(-s*0.68,  s*0.14);
    ctx.closePath();
    ctx.fill();

    const bodyGrad = getBirdGradient(s);
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.ellipse(0, 0, s*0.46, s*0.36, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(12,12,11,0.35)';
    ctx.lineWidth = Math.max(1, s*0.02);
    ctx.stroke();

    ctx.save();
    ctx.translate(-s*0.02, s*0.02);
    ctx.rotate(wingAngle);
    ctx.fillStyle = GOLD_DARK;
    ctx.beginPath();
    ctx.ellipse(0, 0, s*0.30, s*0.17, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    ctx.fillStyle = 'rgba(240,237,230,0.16)';
    ctx.beginPath();
    ctx.ellipse(-s*0.05, s*0.14, s*0.26, s*0.14, 0, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.ellipse(s*0.28, -s*0.10, s*0.24, s*0.22, 0, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = '#e8683a';
    ctx.beginPath();
    ctx.moveTo(s*0.46, -s*0.12);
    ctx.lineTo(s*0.72, -s*0.05);
    ctx.lineTo(s*0.46,  s*0.02);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = 'rgba(12,12,11,0.3)';
    ctx.lineWidth = Math.max(1, s*0.015);
    ctx.stroke();

    ctx.fillStyle = '#0c0c0b';
    ctx.beginPath();
    ctx.arc(s*0.34, -s*0.16, s*0.05, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.beginPath();
    ctx.arc(s*0.325, -s*0.175, s*0.018, 0, Math.PI*2);
    ctx.fill();

    ctx.restore();
  }

  function update(){
    if (Arcade.isPaused()) return;
    frame++;

    if (state === 'playing'){
      const g = gravity();
      const speed = currentSpeed();
      const pw = pipeWidth();
      const gh = groundH();

      bird.vy += g;
      bird.y += bird.vy;
      bird.rot = Math.max(-0.5, Math.min(1.2, bird.vy / 12));

      if (frame % currentInterval() === 0) spawnPipe();

      for (const p of pipes){
        p.x -= speed;
        if (!p.passed && p.x + pw < bird.x - bird.size/2){
          p.passed = true;
          score++;
          document.getElementById('score').textContent = score;
          sfxScore();
        }
      }
      pipes = pipes.filter(p => p.x > -pw - 5);

      const bx = bird.x, by = bird.y, br = bird.size*0.36;
      if (by + br > H - gh || by - br < 0){
        endGame();
      }
      for (const p of pipes){
        if (bx + br > p.x && bx - br < p.x + pw){
          if (by - br < p.topH || by + br > p.topH + p.gap){
            endGame();
          }
        }
      }

      groundOffset -= speed;
    } else {
      groundOffset -= 0.4;
    }
  }

  function draw(){
    const gh = groundH();

    ctx.fillStyle = skyGradient;
    ctx.fillRect(0,0,W,H);

    for (const s of stars){
      ctx.fillStyle = s.color;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fill();
    }

    for (const p of pipes) drawPipe(p);

    ctx.fillStyle = '#141413';
    ctx.fillRect(0, H-gh, W, gh);
    ctx.strokeStyle = GOLD; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, H-gh); ctx.lineTo(W, H-gh); ctx.stroke();

    const tickGap = 26;
    let off = ((groundOffset % tickGap) + tickGap) % tickGap;
    ctx.strokeStyle = BORDER; ctx.lineWidth = 1;
    for (let x = -off; x < W; x += tickGap){
      ctx.beginPath();
      ctx.moveTo(x, H-gh+8);
      ctx.lineTo(x+12, H-gh+8);
      ctx.stroke();
    }

    if (bird) drawBird();
  }

  // ---- Sound effects — thin wrappers around the shared Arcade audio engine ----
  function audioCtx(){ return Arcade.audioCtx(); }
  function tone(freq, dur, type, startGain, opts){ Arcade.tone(freq, dur, type, startGain, opts); }
  function sfxFlap(){ tone(420, 0.14, 'triangle', 0.18, { sweepTo: 720 }); }
  function sfxScore(){
    tone(880, 0.10, 'sine', 0.16);
    setTimeout(()=> tone(1180, 0.12, 'sine', 0.14), 60);
  }
  function sfxHit(){
    Arcade.noiseBurst(0.25, 0.22, 1200);
    tone(140, 0.2, 'sawtooth', 0.12, { sweepTo: 60 });
  }

  function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
  }

  // Canvas needs to be focusable so keyboard input reliably reaches it
  // (some hosting contexts/iframes don't route key events to the window
  // unless a focusable element inside them has focus).
  canvas.setAttribute('tabindex', '0');
  canvas.style.outline = 'none';
  function focusCanvas(){ try { canvas.focus({ preventScroll:true }); } catch(e){} }
  focusCanvas();

  function handleFlapKey(e){
    if (e.code === 'Space' || e.key === ' ' || e.key === 'Spacebar' || e.code === 'ArrowUp'){
      e.preventDefault();
      audioCtx();
      if (state === 'start') startGame();
      else flap();
    }
  }
  window.addEventListener('keydown', handleFlapKey);
  document.addEventListener('keydown', handleFlapKey);

  function onPointer(e){
    e.preventDefault();
    focusCanvas();
    flap();
  }
  canvas.addEventListener('pointerdown', onPointer, { passive:false });
  document.getElementById('startOverlay').addEventListener('pointerdown', function(e){
    if (e.target.closest('.option-btn')) return;
    e.preventDefault();
  }, { passive:false });
  document.querySelectorAll('#startOverlay .option-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      focusCanvas();
      audioCtx();
      startGame(btn.getAttribute('data-diff'));
    });
  });
  document.getElementById('overOverlay').addEventListener('pointerdown', function(e){
    if (e.target.closest('#retryBtn') || e.target.closest('#homeBtn')) return;
    onPointer(e);
  }, { passive:false });
  document.getElementById('retryBtn').addEventListener('click', (e)=>{
    e.stopPropagation();
    focusCanvas();
    startGame();
  });
  document.getElementById('homeBtn').addEventListener('click', (e)=>{
    e.stopPropagation();
  });
  ['touchstart','touchend'].forEach(evt=>{
    canvas.addEventListener(evt, e => e.preventDefault(), { passive:false });
  });

  reset();
  loop();
  Arcade.mountPanels({ gameId: 'flappy' });
  Arcade.mountPauseMenu();
})();

</script>
</body>
</html>
