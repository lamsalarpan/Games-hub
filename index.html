<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Game Hub — Arpan Lamsal</title>
<meta name="description" content="Game Hub — a small collection of mini games by Arpan Lamsal. Flappy Bird, Dino Run, Tic Tac Toe, Road Fighter.">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0c0c0b">

<link rel="icon" href="faviconset/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="16x16" href="faviconset/favicon-16.png">
<link rel="icon" type="image/png" sizes="32x32" href="faviconset/favicon-32.png">
<link rel="icon" type="image/png" sizes="48x48" href="faviconset/favicon-48.png">
<link rel="icon" type="image/png" sizes="192x192" href="faviconset/favicon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="faviconset/favicon-180.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="assets/css/theme.css">
<style>
  body{
    min-height:100vh;
    background:var(--bg);
    position:relative;
    display:flex; flex-direction:column;
  }
  /* Faint fixed gold vignette + hairline grid, echoes the portfolio's
     minimal dark surface without ever reading as "colored" — stays black. */
  body::before{
    content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
    background:radial-gradient(52% 42% at 50% 0%, rgba(200,151,58,0.10), transparent 68%);
  }
  body::after{
    content:''; position:fixed; inset:0; z-index:0; pointer-events:none; opacity:0.5;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size:42px 42px;
    mask-image:radial-gradient(60% 55% at 50% 15%, #000 0%, transparent 75%);
    -webkit-mask-image:radial-gradient(60% 55% at 50% 15%, #000 0%, transparent 75%);
  }
  .nav, .stage-wrap, .site-footer{ position:relative; z-index:1; }

  .stage-wrap{
    flex:1;
    display:flex; align-items:center; justify-content:center;
    padding: calc(var(--nav-h) + 28px) 1.5rem 3rem;
  }
  .hero{
    width:100%; max-width:640px;
    text-align:center;
  }
  @keyframes fadeUp{
    from{ opacity:0; transform:translateY(14px); }
    to{ opacity:1; transform:translateY(0); }
  }
  .hero .mark{
    width:56px; height:56px; margin-bottom:1.4rem;
    animation:fadeUp 0.8s ease 0.05s both, float 4.5s ease-in-out 0.85s infinite;
    filter:drop-shadow(0 6px 18px rgba(200,151,58,0.25));
  }
  .hero .kicker{
    margin-bottom:1.1rem;
    opacity:0; animation:fadeUp 0.8s ease 0s both;
  }
  @keyframes float{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-6px); }
  }
  .nav-logo .mark{ width:30px; height:30px; display:block; }
  .hero h1{
    font-family:var(--font-display); font-weight:300; font-style:italic;
    font-size:clamp(2.6rem, 6.8vw, 4.1rem); color:var(--gold-light);
    line-height:1.06; margin-bottom:0.7rem;
    opacity:0; animation:fadeUp 0.8s ease 0.16s both;
  }
  .hero .title-rule{
    width:64px; height:2px; margin:0 auto 1.1rem;
    background:linear-gradient(90deg, transparent, var(--gold), transparent);
    border-radius:1px;
    opacity:0; animation:fadeUp 0.8s ease 0.24s both;
  }
  .hero .sub{
    font-family:var(--font-mono); font-size:11px; letter-spacing:0.12em;
    text-transform:uppercase; color:var(--text-secondary);
    margin-bottom:1.6rem;
    opacity:0; animation:fadeUp 0.8s ease 0.3s both;
  }

  /* ---- Stat strip (games count / offline / updated) ---- */
  .stat-strip{
    display:flex; align-items:center; justify-content:center;
    gap:0.9rem; flex-wrap:wrap; margin-bottom:1.9rem;
    opacity:0; animation:fadeUp 0.8s ease 0.36s both;
  }
  .stat-chip{
    display:inline-flex; align-items:baseline; gap:0.4rem;
    font-family:var(--font-mono); font-size:10.5px; letter-spacing:0.06em;
    color:var(--text-muted); text-transform:uppercase;
  }
  .stat-chip b{ color:var(--gold-light); font-size:13px; letter-spacing:0.02em; }
  .stat-sep{ width:3px; height:3px; border-radius:50%; background:var(--border-strong); }

  /* ---- Play offline control ---- */
  .offline-row{
    display:flex; align-items:center; justify-content:center; gap:0.7rem;
    margin-bottom:2.6rem; flex-wrap:wrap;
    opacity:0; animation:fadeUp 0.8s ease 0.4s both;
  }
  .offline-btn{
    display:inline-flex; align-items:center; gap:0.55rem;
    background:transparent; color:var(--text-secondary);
    border:1px solid var(--border-strong); border-radius:100px;
    font-family:var(--font-mono); font-size:11px; font-weight:700;
    letter-spacing:0.08em; text-transform:uppercase;
    padding:0.55rem 1.15rem 0.55rem 1rem; cursor:pointer;
    transition:border-color .2s ease, color .2s ease, background .2s ease;
  }
  .offline-btn:hover{ border-color:var(--gold); color:var(--gold-light); }
  .offline-btn svg{ width:14px; height:14px; flex-shrink:0; }
  .offline-btn .dot{
    width:6px; height:6px; border-radius:50%;
    background:var(--text-muted); transition:background .2s ease;
  }
  .offline-btn.ready .dot{ background:var(--gold); box-shadow:0 0 6px rgba(200,151,58,0.8); }
  .offline-btn.ready{ color:var(--gold-light); border-color:var(--gold); background:rgba(200,151,58,0.06); }

  /* ---- Section label above the line-up ---- */
  .section-label{
    display:flex; align-items:center; gap:0.8rem;
    margin-bottom:0.4rem;
    opacity:0; animation:fadeUp 0.8s ease 0.46s both;
  }
  .section-label span{
    font-family:var(--font-mono); font-size:10.5px; letter-spacing:0.18em;
    text-transform:uppercase; color:var(--text-muted); white-space:nowrap;
  }
  .section-label .rule{ flex:1; height:1px; background:var(--border-strong); }

  /* ---- Game line-up: a numbered menu list, not a card grid — reads like
     an arcade cabinet's game select screen and scales cleanly as more
     games are added (each entry is just one more row). ---- */
  .game-list{
    display:flex; flex-direction:column;
    border-top:1px solid var(--border);
    opacity:0; animation:fadeUp 0.8s ease 0.54s both;
  }
  .game-row{
    position:relative;
    display:flex; align-items:center; gap:1.1rem;
    padding:1.15rem 0.25rem 1.15rem 0.9rem;
    border-bottom:1px solid var(--border);
    text-decoration:none; color:inherit;
    transition:padding-left .25s ease, background-color .25s ease;
  }
  .game-row::before{
    content:''; position:absolute; left:0; top:0; bottom:0; width:0;
    background:linear-gradient(180deg, var(--gold-light), var(--gold));
    transition:width .25s ease;
  }
  .game-row:hover, .game-row:focus-visible{
    padding-left:1.3rem; background:rgba(200,151,58,0.045); outline:none;
  }
  .game-row:hover::before, .game-row:focus-visible::before{ width:3px; }
  .game-row:active{ background:rgba(200,151,58,0.08); }

  .row-index{
    font-family:var(--font-display); font-style:italic; font-weight:300;
    font-size:1.5rem; color:var(--text-muted); width:2rem; flex-shrink:0;
    transition:color .25s ease;
  }
  .game-row:hover .row-index{ color:var(--gold); }

  .row-icon{
    position:relative; width:50px; height:50px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
  }
  .row-icon::before{
    content:''; position:absolute; inset:-6px; border-radius:50%;
    background:radial-gradient(circle, rgba(200,151,58,0.18), transparent 72%);
    opacity:0; transition:opacity .3s ease;
  }
  .game-row:hover .row-icon::before{ opacity:1; }
  .row-icon svg{ width:100%; height:100%; display:block; position:relative; transition:transform .3s ease; }
  .game-row:hover .row-icon svg{ transform:scale(1.08); }

  .row-body{ flex:1; min-width:0; display:flex; flex-direction:column; gap:0.22rem; }
  .row-title{
    font-family:var(--font-display); font-style:italic; font-weight:600;
    font-size:1.28rem; color:var(--text-primary); line-height:1.2;
  }
  .row-desc{
    font-family:var(--font-mono); font-size:10.5px; line-height:1.5;
    color:var(--text-secondary);
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }

  .row-cta{
    display:flex; align-items:center; gap:0.4rem; flex-shrink:0;
    font-family:var(--font-mono); font-size:10px; letter-spacing:0.1em;
    text-transform:uppercase; color:var(--gold);
    border:1px solid var(--gold); border-radius:100px;
    padding:0.5rem 0.95rem;
    transition:background .25s ease, color .25s ease;
  }
  .row-cta svg{ width:11px; height:11px; transition:transform .25s ease; }
  .game-row:hover .row-cta{ background:var(--gold); color:#0c0c0b; }
  .game-row:hover .row-cta svg{ transform:translateX(2px); }

  /* ---- "more coming" placeholder row ---- */
  .game-row.more{
    cursor:default; color:var(--text-muted);
  }
  .game-row.more:hover{ padding-left:0.9rem; background:none; }
  .game-row.more:hover::before{ width:0; }
  .game-row.more .row-index{ animation:pulse 2.4s ease-in-out infinite; }
  .game-row.more .row-title{ color:var(--text-muted); font-style:italic; font-weight:400; }
  .game-row.more .row-desc{ white-space:normal; }

  @media (max-width:560px){
    .row-desc{ display:none; }
    .row-cta span{ display:none; }
    .row-cta{ padding:0.55rem; }
    .row-icon{ width:42px; height:42px; }
  }

  .hero .hint{
    font-family:var(--font-mono); font-size:11px; letter-spacing:0.06em;
    color:var(--text-muted); margin-top:1.8rem;
    opacity:0; animation:fadeUp 0.8s ease 0.62s both;
  }

  @media (prefers-reduced-motion: reduce){
    .hero .mark, .hero h1, .hero .title-rule, .hero .sub, .stat-strip, .offline-row,
    .section-label, .game-list, .hero .hint{
      animation:none !important; opacity:1 !important; transform:none !important;
    }
    .game-row{ transition:none; }
    .game-row.more .row-index{ animation:none; }
  }
</style>
</head>
<body>

<nav class="nav">
  <a href="https://lamsalarpan.com.np" class="nav-logo" aria-label="Arpan Lamsal — Home">
    <img class="mark" src="logo.png" alt="Arpan Lamsal logo">
    <span class="nav-title">Game Hub</span>
  </a>
  <a href="https://lamsalarpan.com.np/projects" class="nav-back">← Portfolio</a>
</nav>

<div class="stage-wrap">
  <div class="hero">
    <span class="kicker"><span class="kicker-dot"></span>Arpan Lamsal — Arcade</span>
    <img class="mark" src="logo.png" alt="" aria-hidden="true">
    <h1>Game Hub</h1>

    <div class="sub">A small, growing collection of mini games — pick one to jump straight in</div>
    <div class="stat-strip">
      <span class="stat-chip"><b id="statCount">4</b> Games</span>
      <span class="stat-sep"></span>
      <span class="stat-chip">Works <b>Offline</b></span>

      <span class="stat-chip">No <b>Install</b> Needed</span>
    </div>

    <div class="offline-row">
      <button type="button" class="offline-btn" id="offlineBtn" aria-live="polite">
        <svg viewBox="0 0 24 24" style="fill:none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 18a4.5 4.5 0 0 1-.5-8.97A5.5 5.5 0 0 1 17.3 8.03 4 4 0 0 1 17 16H8"/><path d="M12 12v6m0 0-2.5-2.5M12 18l2.5-2.5"/></svg>

</div>

<footer class="site-footer">
  <div class="footer-inner">
    <span>© 2026 Arpan Lamsal — Game Hub</span>
    <div class="footer-social-icons">
      <a class="social-icon" href="https://lamsalarpan.com.np" aria-label="Portfolio">
        <svg viewBox="0 0 24 24" style="fill:none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </a>
      <a class="social-icon" href="https://github.com/lamsalarpan" aria-label="GitHub" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24"><path d="M12 .5C5.7.5.5 5.7.5 12c0 5 3.3 9.3 7.9 10.8.6.1.8-.3.8-.6v-2.1c-3.2.7-3.9-1.4-3.9-1.4-.5-1.3-1.2-1.7-1.2-1.7-1-.7.1-.7.1-.7 1.1.1 1.7 1.1 1.7 1.1 1 1.7 2.7 1.2 3.3 1 .1-.7.4-1.2.7-1.5-2.6-.3-5.3-1.3-5.3-5.7 0-1.3.4-2.3 1.1-3.1-.1-.3-.5-1.5.1-3.1 0 0 .9-.3 3 1.1a10.4 10.4 0 0 1 5.4 0c2.1-1.4 3-1.1 3-1.1.6 1.6.2 2.8.1 3.1.7.8 1.1 1.8 1.1 3.1 0 4.4-2.7 5.4-5.3 5.7.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6A10.5 10.5 0 0 0 23.5 12C23.5 5.7 18.3.5 12 .5z"/></svg>
      </a>
    </div>
  </div>
</footer>

<script src="assets/js/common.js"></script>
<script>
  // Data-driven grid: adding a future game is just pushing another entry
  // here (folder, title, description, icon) — no markup duplication needed.
  const GAMES = [
    {
      id: 'flappy', title: 'Flappy Bird', href: 'flappy/index.html',
      desc: 'Tap to flap. Weave the gold bird through the pipes.',
      icon: `<defs><linearGradient id="g-flappy" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#e8b55a"/><stop offset="100%" stop-color="#c8973a"/>
      </linearGradient></defs>
      <ellipse cx="55" cy="52" rx="9" ry="17" fill="#9c7328" transform="rotate(28 55 52)"/>
      <ellipse cx="48" cy="50" rx="30" ry="24" fill="url(#g-flappy)" stroke="rgba(12,12,11,0.35)" stroke-width="1.5"/>
      <ellipse cx="38" cy="60" rx="17" ry="9" fill="rgba(240,237,230,0.16)"/>
      <ellipse cx="68" cy="38" rx="16" ry="15" fill="url(#g-flappy)"/>
      <path d="M80 32 L95 38 L80 44 Z" fill="#e8683a" stroke="rgba(12,12,11,0.3)" stroke-width="1"/>
      <circle cx="74" cy="32" r="3.4" fill="#0c0c0b"/>
      <circle cx="72.8" cy="30.8" r="1.2" fill="rgba(255,255,255,0.85)"/>`
    },
    {
      id: 'dino', title: 'Dino Run', href: 'dino/index.html',
      desc: 'Jump the thorns, duck the crows. Speed only goes up.',
      icon: `<defs><linearGradient id="g-dino" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#e8b55a"/><stop offset="100%" stop-color="#c8973a"/>
      </linearGradient></defs>
      <path d="M40 54 Q18 60 8 80 Q22 74 36 65 Z" fill="#9c7328" stroke="rgba(12,12,11,0.35)" stroke-width="1"/>
      <path d="M40 74 L36 92 M40 74 L46 91" stroke="#9c7328" stroke-width="6" stroke-linecap="round"/>
      <path d="M56 76 L53 93 M56 76 L60 92" stroke="#9c7328" stroke-width="6" stroke-linecap="round"/>
      <rect x="32" y="34" width="34" height="44" rx="15" fill="url(#g-dino)" stroke="rgba(12,12,11,0.35)" stroke-width="1.5"/>
      <ellipse cx="42" cy="60" rx="11" ry="15" fill="rgba(240,237,230,0.16)"/>
      <line x1="58" y1="62" x2="67" y2="67" stroke="#9c7328" stroke-width="4" stroke-linecap="round"/>
      <ellipse cx="68" cy="27" rx="17" ry="15" fill="url(#g-dino)" stroke="rgba(12,12,11,0.35)" stroke-width="1.5"/>
      <path d="M79 30 L96 35 L94 44 L74 39 Z" fill="url(#g-dino)" stroke="rgba(12,12,11,0.3)" stroke-width="1"/>
      <path d="M79 37 L82 41 L85 37 L88 41 L91 37" stroke="rgba(240,237,230,0.9)" stroke-width="1.6" fill="none" stroke-linecap="round"/>
      <circle cx="73" cy="21" r="3" fill="#0c0c0b"/>
      <circle cx="71.8" cy="19.8" r="1.1" fill="rgba(255,255,255,0.85)"/>`
    },
    {
      id: 'tictactoe', title: 'Tic Tac Toe', href: 'tic-tac-toe/index.html',
      desc: 'Get three in a row to win.',
      icon: `<defs><linearGradient id="g-ttt" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#e8b55a"/><stop offset="100%" stop-color="#c8973a"/>
      </linearGradient></defs>
      <line x1="38.3" y1="16" x2="38.3" y2="84" stroke="url(#g-ttt)" stroke-width="4.5" stroke-linecap="round"/>
      <line x1="61.7" y1="16" x2="61.7" y2="84" stroke="url(#g-ttt)" stroke-width="4.5" stroke-linecap="round"/>
      <line x1="16" y1="38.3" x2="84" y2="38.3" stroke="url(#g-ttt)" stroke-width="4.5" stroke-linecap="round"/>
      <line x1="16" y1="61.7" x2="84" y2="61.7" stroke="url(#g-ttt)" stroke-width="4.5" stroke-linecap="round"/>
      <path d="M20.5 20.5 L32.5 32.5 M32.5 20.5 L20.5 32.5" stroke="url(#g-ttt)" stroke-width="5" stroke-linecap="round"/>
      <circle cx="73" cy="27.3" r="8.3" fill="none" stroke="#f0ede6" stroke-width="5"/>
      <path d="M67.5 67.5 L79.5 79.5 M79.5 67.5 L67.5 79.5" stroke="url(#g-ttt)" stroke-width="5" stroke-linecap="round"/>
      <circle cx="27.3" cy="73" r="8.3" fill="none" stroke="rgba(240,237,230,0.55)" stroke-width="5"/>`
    },
    {
      id: 'roadfighter', title: 'Road Fighter', href: 'Road-fighter/index.html',
      desc: 'Race against the traffic and avoid collisions.',
      icon: `<defs><linearGradient id="g-road" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#e8b55a"/><stop offset="100%" stop-color="#c8973a"/>
      </linearGradient></defs>
      <line x1="24" y1="18" x2="18" y2="30" stroke="#9c7328" stroke-width="3.5" stroke-linecap="round" opacity="0.6"/>
      <line x1="34" y1="12" x2="28" y2="26" stroke="#9c7328" stroke-width="3.5" stroke-linecap="round" opacity="0.4"/>
      <rect x="32" y="16" width="36" height="68" rx="14" fill="url(#g-road)" stroke="rgba(12,12,11,0.35)" stroke-width="1.5"/>
      <rect x="40" y="34" width="20" height="16" rx="5" fill="rgba(12,12,11,0.55)"/>
      <rect x="22" y="38" width="10" height="10" rx="3" fill="rgba(12,12,11,0.4)"/>
      <rect x="68" y="38" width="10" height="10" rx="3" fill="rgba(12,12,11,0.4)"/>
      <circle cx="42" cy="27" r="3.6" fill="#f0ede6"/>
      <circle cx="58" cy="27" r="3.6" fill="#f0ede6"/>
      <circle cx="41.5" cy="76" r="3.4" fill="#c8432a"/>
      <circle cx="58.5" cy="76" r="3.4" fill="#c8432a"/>`
    }
  ];

  const list = document.getElementById('gameList');
  GAMES.forEach((g, i) => {
    const a = document.createElement('a');
    a.className = 'game-row';
    a.href = g.href;
    a.id = g.id + 'Card';
    a.setAttribute('aria-label', 'Play ' + g.title);
    a.innerHTML = `
      <span class="row-index">${String(i+1).padStart(2,'0')}</span>
      <span class="row-icon"><svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">${g.icon}</svg></span>
      <span class="row-body">
        <span class="row-title">${g.title}</span>
        <span class="row-desc">${g.desc}</span>
      </span>
      <span class="row-cta">Play <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span>
    `;
    list.appendChild(a);
  });
  // A dashed placeholder row signals there's room for more without
  // looking like a broken layout when a fifth game shows up.
  const more = document.createElement('div');
  more.className = 'game-row more';
  more.innerHTML = `
    <span class="row-index">+</span>
    <span class="row-body"><span class="row-title">More on the way</span><span class="row-desc">New games get added here as they're built.</span></span>
  `;
  list.appendChild(more);

  const cards = Array.from(list.querySelectorAll('.game-row:not(.more)'));
  let focusIdx = -1;
  function setFocus(i){
    focusIdx = (i + cards.length) % cards.length;
    cards[focusIdx].focus();
  }
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowDown' || e.key === 'ArrowRight'){ e.preventDefault(); setFocus(focusIdx === -1 ? 0 : focusIdx + 1); }
    else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft'){ e.preventDefault(); setFocus(focusIdx === -1 ? 0 : focusIdx - 1); }
    else if ((e.key === 'Enter' || e.key === ' ') && focusIdx !== -1){
      e.preventDefault();
      window.location.href = cards[focusIdx].getAttribute('href');
    }
  });

  // ---- Offline support ----
  const OFFLINE_FLAG = 'game_hub_offline_ready';
  const offlineBtn = document.getElementById('offlineBtn');
  const offlineBtnLabel = document.getElementById('offlineBtnLabel');

  function setOfflineReadyUI(ready){
    offlineBtn.classList.toggle('ready', ready);
    offlineBtnLabel.textContent = ready ? 'Ready Offline' : 'Play Offline';
  }
  setOfflineReadyUI(localStorage.getItem(OFFLINE_FLAG) === '1');

  Arcade.registerServiceWorker('sw.js');

  offlineBtn.addEventListener('click', async () => {
    if (!('serviceWorker' in navigator) || !navigator.serviceWorker){
      Arcade.toast('Offline play needs a modern browser.');
      return;
    }
    offlineBtnLabel.textContent = 'Saving…';
    try {
      const reg = await navigator.serviceWorker.ready;
      if (reg.active) reg.active.postMessage('PRECACHE_ALL');
      localStorage.setItem(OFFLINE_FLAG, '1');
      setOfflineReadyUI(true);
      Arcade.toast('Saved — Game Hub now works offline.');
    } catch (e) {
      Arcade.toast('Could not save for offline right now.');
    }
  });
</script>
</body>
</html>
