<link rel="stylesheet" href="assets/css/theme.css">
<style>
  html, body{ background:#000; }
  body{
    min-height:100vh;
    display:flex; flex-direction:column;
    position:relative;
    overflow-x:hidden;
  }

  /* ---- Starfield backdrop (pure CSS, no canvas loop needed) ---- */
  #starfield{
    position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden;
  }
  #starfield span{
    position:absolute; display:block; border-radius:50%;
    background:#fff; opacity:0;
    animation:twinkle linear infinite;
  }
  @keyframes twinkle{
    0%, 100%{ opacity:0; }
    50%{ opacity:var(--tw-opacity, 0.6); }
  }
  .stage-wrap, .site-footer, .nav{ position:relative; z-index:1; }

  @media (prefers-reduced-motion: reduce){
    #starfield span{ animation:none; opacity:var(--tw-opacity, 0.4); }
  }

  .stage-wrap{
    flex:1;
    display:flex; align-items:center; justify-content:center;
    padding: calc(var(--nav-h) + 28px) 1.5rem 3rem;
  }
  .hero{
    width:100%; max-width:760px;
    text-align:center;
  }
  @keyframes fadeUp{
    from{ opacity:0; transform:translateY(14px); }
    to{ opacity:1; transform:translateY(0); }
  }
  .hero .mark{
    width:64px; height:64px; margin-bottom:1.3rem;
    animation:fadeUp 0.8s ease 0.05s both, float 4.5s ease-in-out 0.85s infinite;
    filter:drop-shadow(0 6px 18px rgba(200,151,58,0.3));
  }
  @keyframes float{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-6px); }
  }
  .nav-logo .mark{ width:30px; height:30px; display:block; }

  .eyebrow{
    display:flex; align-items:center; justify-content:center; gap:0.9rem;
    margin-bottom:1rem;
    font-family:var(--font-mono); font-size:10.5px; letter-spacing:0.16em;
    text-transform:uppercase; color:var(--gold);
    opacity:0; animation:fadeUp 0.8s ease 0.1s both;
  }
  .eyebrow .divider-line{ width:34px; height:1px; background:var(--border-strong); }

  .hero h1{
    font-family:var(--font-display); font-weight:300; font-style:italic;
    font-size:clamp(2.6rem, 6.8vw, 4.1rem); color:var(--gold-light);
    line-height:1.06; margin-bottom:0.7rem;
    opacity:0; animation:fadeUp 0.8s ease 0.16s both;
  }
  .hero .title-rule{
    width:64px; height:2px; margin:0 auto 1.1rem;
    background:linear-gradient(90deg, transparent, var(--gold), transparent);
    border-radius:1px;
    opacity:0; animation:fadeUp 0.8s ease 0.24s both;
  }
  .hero .sub{
    font-family:var(--font-mono); font-size:11px; letter-spacing:0.12em;
    text-transform:uppercase; color:var(--text-secondary);
    margin-bottom:1.8rem;
    opacity:0; animation:fadeUp 0.8s ease 0.3s both;
  }

  /* ---- Play offline control ---- */
  .offline-row{
    display:flex; align-items:center; justify-content:center; gap:0.7rem;
    margin-bottom:2.6rem; flex-wrap:wrap;
    opacity:0; animation:fadeUp 0.8s ease 0.4s both;
  }
  .offline-btn{
    display:inline-flex; align-items:center; gap:0.55rem;
    background:transparent; color:var(--text-secondary);
    border:1px solid var(--border-strong); border-radius:100px;
    font-family:var(--font-mono); font-size:11px; font-weight:700;
    letter-spacing:0.08em; text-transform:uppercase;
    padding:0.55rem 1.15rem 0.55rem 1rem; cursor:pointer;
    transition:border-color .2s ease, color .2s ease, background .2s ease;
  }
  .offline-btn:hover{ border-color:var(--gold); color:var(--gold-light); }
  .offline-btn svg{ width:14px; height:14px; flex-shrink:0; }
  .offline-btn .dot{
    width:6px; height:6px; border-radius:50%;
    background:var(--text-muted); transition:background .2s ease;
  }
  .offline-btn.ready .dot{ background:var(--gold); box-shadow:0 0 6px rgba(200,151,58,0.8); }
  .offline-btn.ready{ color:var(--gold-light); border-color:var(--gold); background:rgba(200,151,58,0.06); }

  /* ---- Game grid (data-driven so new games are just new entries) ---- */
  .section-label{
    font-family:var(--font-mono); font-size:10.5px; letter-spacing:0.16em;
    text-transform:uppercase; color:var(--text-muted);
    margin-bottom:1rem;
    opacity:0; animation:fadeUp 0.8s ease 0.46s both;
  }
  .game-grid{
    display:grid; grid-template-columns:1fr 1fr; gap:1.1rem;
    opacity:0; animation:fadeUp 0.8s ease 0.5s both;
  }
  @media (max-width:520px){
    .game-grid{ grid-template-columns:1fr; }
  }

  .game-card{
    position:relative;
    display:flex; flex-direction:column; align-items:center;
    background:var(--bg-card);
    border:1px solid var(--border-strong);
    border-radius:8px;
    padding:2.2rem 1.4rem 1.7rem;
    text-decoration:none; color:inherit;
    cursor:pointer;
    transform-style:preserve-3d;
    transition:transform .25s ease, border-color .25s ease, box-shadow .25s ease;
    overflow:hidden;
  }
  .game-card::before, .game-card::after{
    content:''; position:absolute; width:20px; height:20px;
    border-color:var(--accent, var(--gold)); opacity:0; transition:opacity .25s ease;
  }
  .game-card::before{ top:-1px; left:-1px; border-top:2px solid; border-left:2px solid; border-radius:8px 0 0 0; }
  .game-card::after{ bottom:-1px; right:-1px; border-bottom:2px solid; border-right:2px solid; border-radius:0 0 8px 0; }
  .game-card:hover, .game-card:focus-visible{
    transform:translateY(-4px);
    border-color:var(--accent, var(--gold));
    box-shadow:0 20px 50px rgba(0,0,0,0.5), 0 0 0 1px var(--accent-glow, transparent);
    outline:none;
  }
  .game-card:hover::before, .game-card:hover::after,
  .game-card:focus-visible::before, .game-card:focus-visible::after{ opacity:1; }
  .game-card:active{ transform:translateY(-1px) scale(0.99); }

  .game-card .icon-wrap{
    position:relative;
    width:84px; height:84px; margin-bottom:1.3rem;
    display:flex; align-items:center; justify-content:center;
    transform:translateZ(20px);
  }
  .game-card .icon-wrap::before{
    content:''; position:absolute; inset:-8px; border-radius:50%;
    background:radial-gradient(circle, var(--accent-glow, rgba(200,151,58,0.16)), transparent 72%);
    opacity:0; transition:opacity .3s ease;
  }
  .game-card:hover .icon-wrap::before{ opacity:1; }
  .game-card svg{ width:100%; height:100%; display:block; position:relative; transition:transform .3s ease; }
  .game-card:hover svg{ transform:scale(1.06); }

  .game-card h2{
    font-family:var(--font-display); font-weight:400; font-style:italic;
    font-size:1.7rem; color:var(--text-primary); margin-bottom:0.4rem;
  }
  .game-card .desc{
    font-family:var(--font-mono); font-size:11.5px; line-height:1.6;
    color:var(--text-secondary); margin-bottom:1.3rem;
  }
  .game-card .play-tag{
    font-family:var(--font-mono); font-size:10px; letter-spacing:0.12em;
    text-transform:uppercase; color:var(--accent, var(--gold));
    border:1px solid var(--accent, var(--gold)); border-radius:100px;
    padding:0.45rem 1.1rem;
    transition:background .25s ease, color .25s ease;
  }
  .game-card:hover .play-tag{
    background:var(--accent, var(--gold)); color:#0c0c0b;
  }

  /* ---- "more coming" placeholder card, so the grid never looks unfinished ---- */
  .game-card.more{
    cursor:default; align-items:center; justify-content:center;
    min-height:220px; border-style:dashed;
  }
  .game-card.more:hover{ transform:none; box-shadow:none; border-color:var(--border-strong); }
  .game-card.more:hover::before, .game-card.more:hover::after{ opacity:0; }
  .game-card.more .plus{
    font-family:var(--font-display); font-size:2.4rem; font-style:italic;
    color:var(--text-muted); margin-bottom:0.6rem;
    animation:pulse 2.4s ease-in-out infinite;
  }
  .game-card.more .desc{ margin-bottom:0; }

  .hero .hint{
    font-family:var(--font-mono); font-size:11px; letter-spacing:0.06em;
    color:var(--text-muted); margin-top:2.2rem;
    opacity:0; animation:fadeUp 0.8s ease 0.62s both;
  }

  @media (prefers-reduced-motion: reduce){
    .hero .mark, .eyebrow, .hero h1, .hero .title-rule, .hero .sub, .offline-row, .section-label, .game-grid, .hero .hint{
      animation:none !important; opacity:1 !important; transform:none !important;
    }
    .game-card{ transition:none; }
    .game-card.more .plus{ animation:none; }
  }
</style>
</head>
<body>

<div id="starfield" aria-hidden="true"></div>

<footer class="site-footer">

      </a>
      <a class="social-icon" href="https://github.com/lamsalarpan" aria-label="GitHub" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24"><path d="M12 .5C5.7.5.5 5.7.5 12c0 5 3.3 9.3 7.9 10.8.6.1.8-.3.8-.6v-2.1c-3.2.7-3.9-1.4-3.9-1.4-.5-1.3-1.2-1.7-1.2-1.7-1-.7.1-.7.1-.7 1.1.1 1.7 1.1 1.7 1.1 1 1.7 2.7 1.2 3.3 1 .1-.7.4-1.2.7-1.5-2.6-.3-5.3-1.3-5.3-5.7 0-1.3.4-2.3 1.1-3.1-.1-.3-.5-1.5.1-3.1 0 0 .9-.3 3 1.1a10.4 10.4 0 0 1 5.4 0c2.1-1.4 3-1.1 3-1.1.6 1.6.2 2.8.1 3.1.7.8 1.1 1.8 1.1 3.1 0 4.4-2.7 5.4-5.3 5.7.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6A10.5 10.5 0 0 0 23.5 12C23.5 5.7 18.3.5 12 .5z"/></svg>

</footer>

<script src="assets/js/common.js"></script>
<script>
  // Data-driven grid: adding a future game is just pushing another entry
  // here (folder, title, description, icon) — no markup duplication needed.
  const GAMES = [
    {
      id: 'flappy', title: 'Flappy Bird', href: 'flappy/index.html', accent: '#e8b55a', accentGlow: 'rgba(232,181,90,0.20)',
      desc: 'Tap to flap. Weave the gold bird through the pipes.',
      icon: `<defs><linearGradient id="g-flappy" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#e8b55a"/><stop offset="100%" stop-color="#c8973a"/>
      </linearGradient></defs>
      <ellipse cx="55" cy="52" rx="9" ry="17" fill="#9c7328" transform="rotate(28 55 52)"/>
      <ellipse cx="48" cy="50" rx="30" ry="24" fill="url(#g-flappy)" stroke="rgba(12,12,11,0.35)" stroke-width="1.5"/>
      <ellipse cx="38" cy="60" rx="17" ry="9" fill="rgba(240,237,230,0.16)"/>
      <ellipse cx="68" cy="38" rx="16" ry="15" fill="url(#g-flappy)"/>
      <path d="M80 32 L95 38 L80 44 Z" fill="#e8683a" stroke="rgba(12,12,11,0.3)" stroke-width="1"/>
      <circle cx="74" cy="32" r="3.4" fill="#0c0c0b"/>
      <circle cx="72.8" cy="30.8" r="1.2" fill="rgba(255,255,255,0.85)"/>`
    },
    {
      id: 'dino', title: 'Dino Run', href: 'dino/index.html', accent: '#d98a3d', accentGlow: 'rgba(217,138,61,0.20)',
      desc: 'Jump the thorns, duck the crows. Speed only goes up.',
      icon: `<defs><linearGradient id="g-dino" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#e8b55a"/><stop offset="100%" stop-color="#c8973a"/>
      </linearGradient></defs>
      <path d="M40 54 Q18 60 8 80 Q22 74 36 65 Z" fill="#9c7328" stroke="rgba(12,12,11,0.35)" stroke-width="1"/>
      <path d="M40 74 L36 92 M40 74 L46 91" stroke="#9c7328" stroke-width="6" stroke-linecap="round"/>
      <path d="M56 76 L53 93 M56 76 L60 92" stroke="#9c7328" stroke-width="6" stroke-linecap="round"/>
      <rect x="32" y="34" width="34" height="44" rx="15" fill="url(#g-dino)" stroke="rgba(12,12,11,0.35)" stroke-width="1.5"/>
      <ellipse cx="42" cy="60" rx="11" ry="15" fill="rgba(240,237,230,0.16)"/>
      <line x1="58" y1="62" x2="67" y2="67" stroke="#9c7328" stroke-width="4" stroke-linecap="round"/>
      <ellipse cx="68" cy="27" rx="17" ry="15" fill="url(#g-dino)" stroke="rgba(12,12,11,0.35)" stroke-width="1.5"/>
      <path d="M79 30 L96 35 L94 44 L74 39 Z" fill="url(#g-dino)" stroke="rgba(12,12,11,0.3)" stroke-width="1"/>
      <path d="M79 37 L82 41 L85 37 L88 41 L91 37" stroke="rgba(240,237,230,0.9)" stroke-width="1.6" fill="none" stroke-linecap="round"/>
      <circle cx="73" cy="21" r="3" fill="#0c0c0b"/>
      <circle cx="71.8" cy="19.8" r="1.1" fill="rgba(255,255,255,0.85)"/>`
    },
    {
      id: 'tictactoe', title: 'Tic Tac Toe', href: 'tic-tac-toe/index.html', accent: '#d8d0bd', accentGlow: 'rgba(216,208,189,0.20)',
      desc: 'Get three in a row to win.',
      icon: `<defs><linearGradient id="g-ttt" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#e8b55a"/><stop offset="100%" stop-color="#c8973a"/>
      </linearGradient></defs>
      <line x1="38.3" y1="16" x2="38.3" y2="84" stroke="url(#g-ttt)" stroke-width="4.5" stroke-linecap="round"/>
      <line x1="61.7" y1="16" x2="61.7" y2="84" stroke="url(#g-ttt)" stroke-width="4.5" stroke-linecap="round"/>
      <line x1="16" y1="38.3" x2="84" y2="38.3" stroke="url(#g-ttt)" stroke-width="4.5" stroke-linecap="round"/>
      <line x1="16" y1="61.7" x2="84" y2="61.7" stroke="url(#g-ttt)" stroke-width="4.5" stroke-linecap="round"/>
      <path d="M20.5 20.5 L32.5 32.5 M32.5 20.5 L20.5 32.5" stroke="url(#g-ttt)" stroke-width="5" stroke-linecap="round"/>
      <circle cx="73" cy="27.3" r="8.3" fill="none" stroke="#f0ede6" stroke-width="5"/>
      <path d="M67.5 67.5 L79.5 79.5 M79.5 67.5 L67.5 79.5" stroke="url(#g-ttt)" stroke-width="5" stroke-linecap="round"/>
      <circle cx="27.3" cy="73" r="8.3" fill="none" stroke="rgba(240,237,230,0.55)" stroke-width="5"/>`
    },
    {
      id: 'roadfighter', title: 'Road Fighter', href: 'Road-fighter/index.html', accent: '#d9663f', accentGlow: 'rgba(217,102,63,0.20)',
      desc: 'Race against the traffic and avoid collisions.',
      icon: `<defs><linearGradient id="g-road" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#e8b55a"/><stop offset="100%" stop-color="#c8973a"/>
      </linearGradient></defs>
      <line x1="24" y1="18" x2="18" y2="30" stroke="#9c7328" stroke-width="3.5" stroke-linecap="round" opacity="0.6"/>
      <line x1="34" y1="12" x2="28" y2="26" stroke="#9c7328" stroke-width="3.5" stroke-linecap="round" opacity="0.4"/>
      <rect x="32" y="16" width="36" height="68" rx="14" fill="url(#g-road)" stroke="rgba(12,12,11,0.35)" stroke-width="1.5"/>
      <rect x="40" y="34" width="20" height="16" rx="5" fill="rgba(12,12,11,0.55)"/>
      <rect x="22" y="38" width="10" height="10" rx="3" fill="rgba(12,12,11,0.4)"/>
      <rect x="68" y="38" width="10" height="10" rx="3" fill="rgba(12,12,11,0.4)"/>
      <circle cx="42" cy="27" r="3.6" fill="#f0ede6"/>
      <circle cx="58" cy="27" r="3.6" fill="#f0ede6"/>
      <circle cx="41.5" cy="76" r="3.4" fill="#c8432a"/>
      <circle cx="58.5" cy="76" r="3.4" fill="#c8432a"/>`
    }
  ];

  const grid = document.getElementById('gameGrid');
  GAMES.forEach(g => {
    const a = document.createElement('a');
    a.className = 'game-card';
    a.href = g.href;
    a.id = g.id + 'Card';
    a.style.setProperty('--accent', g.accent);
    a.style.setProperty('--accent-glow', g.accentGlow);
    a.setAttribute('aria-label', 'Play ' + g.title);
    a.innerHTML = `
      <div class="icon-wrap"><svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">${g.icon}</svg></div>
      <h2>${g.title}</h2>
      <div class="desc">${g.desc}</div>
      <span class="play-tag">Play</span>
    `;
    grid.appendChild(a);
  });
  // A dashed placeholder card signals there's room for more without
  // looking like a broken layout when a fifth game shows up.
  const more = document.createElement('div');
  more.className = 'game-card more';
  more.innerHTML = `<div class="plus">+</div><div class="desc">More games coming soon</div>`;
  grid.appendChild(more);

  const cards = Array.from(grid.querySelectorAll('.game-card:not(.more)'));
  let focusIdx = -1;
  function setFocus(i){
    focusIdx = (i + cards.length) % cards.length;
    cards[focusIdx].focus();
  }
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight'){ e.preventDefault(); setFocus(focusIdx === -1 ? 0 : focusIdx + 1); }
    else if (e.key === 'ArrowLeft'){ e.preventDefault(); setFocus(focusIdx === -1 ? 0 : focusIdx - 1); }
    else if ((e.key === 'Enter' || e.key === ' ') && focusIdx !== -1){
      e.preventDefault();
      window.location.href = cards[focusIdx].getAttribute('href');
    }
  });

  // Subtle parallax tilt on hover — mouse-driven, so it's skipped entirely
  // on touch devices and when the person prefers reduced motion.
  const canTilt = window.matchMedia('(pointer: fine)').matches
    && !window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (canTilt){
    cards.forEach(card => {
      card.addEventListener('mousemove', (e) => {
        const r = card.getBoundingClientRect();
        const px = (e.clientX - r.left) / r.width - 0.5;
        const py = (e.clientY - r.top) / r.height - 0.5;
        card.style.transform = `perspective(700px) rotateY(${px * 7}deg) rotateX(${-py * 7}deg) translateY(-4px)`;
      });
      card.addEventListener('mouseleave', () => { card.style.transform = ''; });
    });
  }

  // ---- Starfield ----
  (function initStarfield(){
    const field = document.getElementById('starfield');
    const count = window.matchMedia('(pointer: coarse)').matches ? 40 : 70;
    const frag = document.createDocumentFragment();
    for (let i = 0; i < count; i++){
      const s = document.createElement('span');
      const size = (Math.random() * 1.6 + 0.6).toFixed(2);
      s.style.left = (Math.random() * 100) + '%';
      s.style.top = (Math.random() * 100) + '%';
      s.style.width = size + 'px';
      s.style.height = size + 'px';
      s.style.setProperty('--tw-opacity', (Math.random() * 0.5 + 0.3).toFixed(2));
      s.style.animationDuration = (Math.random() * 4 + 3).toFixed(2) + 's';
      s.style.animationDelay = (Math.random() * 5).toFixed(2) + 's';
      frag.appendChild(s);
    }
    field.appendChild(frag);
  })();

  // ---- Offline support ----
  const OFFLINE_FLAG = 'game_hub_offline_ready';
  const offlineBtn = document.getElementById('offlineBtn');
  const offlineBtnLabel = document.getElementById('offlineBtnLabel');

  function setOfflineReadyUI(ready){
    offlineBtn.classList.toggle('ready', ready);
    offlineBtnLabel.textContent = ready ? 'Ready Offline' : 'Play Offline';
  }
  setOfflineReadyUI(localStorage.getItem(OFFLINE_FLAG) === '1');

  Arcade.registerServiceWorker('sw.js');

  offlineBtn.addEventListener('click', async () => {
    if (!('serviceWorker' in navigator) || !navigator.serviceWorker){
      Arcade.toast('Offline play needs a modern browser.');
      return;
    }
    offlineBtnLabel.textContent = 'Saving…';
    try {
      const reg = await navigator.serviceWorker.ready;
      if (reg.active) reg.active.postMessage('PRECACHE_ALL');
      localStorage.setItem(OFFLINE_FLAG, '1');
      setOfflineReadyUI(true);
      Arcade.toast('Saved — Game Hub now works offline.');
    } catch (e) {
      Arcade.toast('Could not save for offline right now.');
    }
  });
</script>
</body>
</html>
