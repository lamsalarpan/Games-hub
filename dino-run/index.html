<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Dino Run — Arpan Lamsal</title>
<meta name="description" content="A Dino Run clone built by Arpan Lamsal, styled to match his portfolio and Flappy Bird game.">

<link rel="icon" href="../faviconset/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="16x16" href="../faviconset/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="../faviconset/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="192x192" href="../faviconset/android-chrome-192x192.png">
<link rel="apple-touch-icon" sizes="180x180" href="../faviconset/apple-touch-icon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../assets/css/theme.css">
<style>
  html,body{ height:100%; }
  body::before{
    content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
    background:radial-gradient(60% 50% at 50% 38%, rgba(127,216,143,0.09), transparent 70%);
  }
  .nav, .stage-wrap, .hud{ position:relative; z-index:1; }
  html,body{
    height:100%;
    overflow:hidden;
    touch-action:none;
    overscroll-behavior:none;
    -webkit-user-select:none; user-select:none;
  }

  /* ---- Game stage (dino-specific canvas sizing/frame) ---- */
  .stage-wrap{
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    padding-top:var(--nav-h);
  }
  #game{
    display:block;
    background:linear-gradient(180deg, #0c0c0b 0%, #14140f 55%, #1a1710 100%);
    border:1px solid var(--border-strong);
    border-radius:4px;
    box-shadow:0 40px 100px rgba(0,0,0,0.55);
    touch-action:none;
  }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-left">
    <a href="https://arpanlamsal.com.np" class="nav-logo" aria-label="Arpan Lamsal — Home">
      <img src="../logo.png" alt="Arpan Lamsal logo">
      <span class="nav-title" style="color:#7fd88f">Dino Run</span>
    </a>
    <a href="../index.html" class="nav-home-btn" aria-label="Back to Game Hub">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      <span>Hub</span>
    </a>
  </div>
</nav>

<div class="hud">
  <div class="score mono" id="score">0</div>
</div>

<div class="stage-wrap">
  <canvas id="game"></canvas>
</div>

<!-- Start overlay -->
<div class="overlay show" id="startOverlay">
  <div class="panel">
    <img class="mark" src="../logo.png" alt="">
    <h1>Choose your pace.</h1>
    <div class="sub">Space / Up · Click · Tap</div>
    <div class="option-list" id="diffRow">
      <button type="button" class="option-btn" data-diff="easy">
        <div class="opt-title">Easy</div>
        <div class="opt-desc">Slower start, gentler ramp. A relaxed run.</div>
      </button>
      <button type="button" class="option-btn" data-diff="medium">
        <div class="opt-title">Medium</div>
        <div class="opt-desc">The standard run. Balanced speed and obstacles.</div>
      </button>
      <button type="button" class="option-btn" data-diff="hard">
        <div class="opt-title">Hard</div>
        <div class="opt-desc">Fast from the start. Boulders arrive early.</div>
      </button>
    </div>
    <div class="stat-row"><span>Best Score</span><b id="startBest">0</b></div>
    <div class="hint">Jump the thorns, duck the crows, dodge the boulders.<br>Down arrow · swipe down to duck.</div>
  </div>
</div>

<!-- Game over overlay -->
<div class="overlay" id="overOverlay">
  <div class="panel">
    <h1>Game over.</h1>
    <div class="sub">It never gets easier — only more familiar</div>
    <div class="stat-row"><span>Score</span><b id="finalScore">0</b></div>
    <div class="stat-row"><span>Best</span><b id="finalBest">0</b></div>
    <span class="new-best" id="newBestTag">New Best</span>
    <button type="button" class="btn-primary" id="retryBtn">Run Again</button>
    <a class="btn-secondary" id="homeBtn" href="../index.html">Back to Home</a>
    <div class="hint">Space · Click · Tap to retry</div>
  </div>
</div>

<script src="../assets/js/common.js"></script>
<script>
(function(){
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d', { alpha: false, desynchronized: true });

  const GOLD = '#c8973a';
  const GOLD_LIGHT = '#e8b55a';
  const GOLD_DARK = '#9c7328';
  const BORDER = 'rgba(255,255,255,0.13)';
  const TEXT_MUTED = '#505050';

  // Coarse-pointer (touch) devices get a lower pixel-ratio cap. Rendering
  // fewer physical pixels is by far the biggest lever for smooth mobile
  // performance, and the visual difference is negligible on a phone screen.
  const IS_COARSE = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
  const DPR_CAP = IS_COARSE ? 1.5 : 2;

  let W, H, DPR;
  let skyGradient = null;
  // Declared here (not just near the functions that use them) because
  // resize() references them on the very first call, before the script
  // has reached their original definitions further down — that ordering
  // bug was throwing and silently killing the whole script on load.
  let _pipeGradCache = null, _pipeGradW = -1;
  let _birdGradCache = null, _birdGradSize = -1;
  let shakeTime = 0, shakeMag = 0;
  function viewportH(){
    return window.visualViewport ? window.visualViewport.height : window.innerHeight;
  }
  function resize(){
    DPR = Math.min(window.devicePixelRatio || 1, DPR_CAP);
    const maxW = Math.min(window.innerWidth * 0.94, 860);
    const maxH = Math.max(200, viewportH() - 64 - 24);
    let w = maxW, h = w / 2.15;
    if (h > maxH){ h = maxH; w = h * 2.15; }
    W = Math.round(w); H = Math.round(h);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    ctx.setTransform(DPR,0,0,DPR,0,0);
    if (dino) dino.size = Math.max(24, H*0.15);
    skyGradient = ctx.createLinearGradient(0,0,0,H);
    skyGradient.addColorStop(0, '#0c0c0b');
    skyGradient.addColorStop(0.6, '#14140f');
    skyGradient.addColorStop(1, '#1a1710');
    _pipeGradCache = null;
    _birdGradCache = null;
  }
  let resizeQueued = false;
  function queueResize(){
    if (resizeQueued) return;
    resizeQueued = true;
    requestAnimationFrame(() => { resizeQueued = false; resize(); });
  }
  window.addEventListener('resize', queueResize);
  window.addEventListener('orientationchange', () => setTimeout(resize, 50));
  if (window.visualViewport) window.visualViewport.addEventListener('resize', queueResize);

  // Three difficulty tiers. Speed/ramp/spawn-interval/crow-bias/boulder-unlock
  // all scale off these so "Hard" isn't just faster — it also ramps sooner
  // and introduces the boulder obstacle earlier. Declared this early (rather
  // than near the other difficulty-related functions further down) because
  // the difficulty-button wiring below references them immediately.
  const DIFFICULTY_PRESETS = {
    easy:   { speedMul: 0.80, rampDist: 11000, intervalBase: 94, intervalMin: 56, crowBias: -0.06, boulderUnlock: 9000  },
    medium: { speedMul: 1.04, rampDist: 7000,  intervalBase: 82, intervalMin: 46, crowBias: 0.02,   boulderUnlock: 5400  },
    hard:   { speedMul: 1.42, rampDist: 3800,  intervalBase: 60, intervalMin: 32, crowBias: 0.13,   boulderUnlock: 2200  },
  };
  const DIFF_KEY = 'dino_al_difficulty';
  let difficulty = localStorage.getItem(DIFF_KEY) || 'medium';
  function preset(){ return DIFFICULTY_PRESETS[difficulty] || DIFFICULTY_PRESETS.medium; }

  const STORAGE_KEY = 'dino_al_best';
  let best = parseInt(localStorage.getItem(STORAGE_KEY) || '0', 10);
  document.getElementById('startBest').textContent = best;

  let state = 'start';
  let dino, obstacles, score, frame, groundOffset, distance;
  let hillOffset1 = 0, hillOffset2 = 0;
  let stars = [];

  resize();

  function initStars(){
    stars = [];
    const count = IS_COARSE ? 18 : 34;
    for(let i=0;i<count;i++){
      const a = Math.random()*0.5+0.15;
      stars.push({
        x: Math.random()*W, y: Math.random()*H*0.55,
        r: Math.random()*1.4+0.3, color: `rgba(240,237,230,${a.toFixed(2)})`
      });
    }
  }

  function groundH(){ return Math.max(30, H*0.14); }
  function groundY(){ return H - groundH(); }

  function reset(){
    const size = Math.max(24, H*0.15);
    dino = {
      x: Math.max(46, W*0.12),
      y: groundY(),
      vy: 0,
      size,
      standH: size*1.05,
      duckH: size*0.60,
      ducking: false,
      onGround: true,
      legPhase: 0,
      wingKick: 0
    };
    obstacles = [];
    score = 0;
    frame = 0;
    distance = 0;
    groundOffset = 0;
    hillOffset1 = 0; hillOffset2 = 0;
    shakeTime = 0; shakeMag = 0;
    document.getElementById('score').textContent = '0';
    initStars();
  }

  // Medium difficulty: a gentle start with a long, gradual ramp rather than
  // a hard spike, so the first minute stays approachable while later play
  // still keeps building tension.
  function gravity(){ return 0.58 * (H/260); }
  function jumpForce(){ return -11 * (H/260); }
  function baseSpeed(){ return 4.1 * (W/720) * preset().speedMul; }

  function currentSpeed(){
    const t = Math.min(1, distance / preset().rampDist);
    return baseSpeed() * (1 + t * 1.0);
  }
  function currentInterval(){
    const p = preset();
    const t = Math.min(1, distance / p.rampDist);
    const base = p.intervalBase - t * 20;
    return Math.max(p.intervalMin, base) + (Math.random()*22 - 11);
  }

  let nextSpawnFrame = 60;

  function jump(){
    if (state === 'over'){
      startGame();
      return;
    }
    if (state !== 'playing') return;
    if (dino.onGround && !dino.ducking){
      dino.vy = jumpForce();
      dino.onGround = false;
      dino.wingKick = 1;
      sfxJump();
    }
  }

  function setDuck(on){
    if (state !== 'playing') return;
    const wasDucking = dino.ducking;
    dino.ducking = on && dino.onGround;
    if (dino.ducking && !wasDucking) sfxDuck();
  }

  function startGame(diff){
    if (diff){ difficulty = diff; localStorage.setItem(DIFF_KEY, diff); }
    reset();
    state = 'playing';
    document.getElementById('startOverlay').classList.remove('show');
    document.getElementById('overOverlay').classList.remove('show');
    document.getElementById('score').classList.add('show');
    nextSpawnFrame = 55;
  }

  function endGame(){
    state = 'over';
    sfxHit();
    shakeTime = 14; shakeMag = Math.max(6, H*0.03);
    document.getElementById('score').classList.remove('show');
    const isNewBest = score > best;
    if (isNewBest){ best = score; localStorage.setItem(STORAGE_KEY, String(best)); }
    document.getElementById('finalScore').textContent = score;
    document.getElementById('finalBest').textContent = best;
    document.getElementById('newBestTag').classList.toggle('show', isNewBest);
    document.getElementById('overOverlay').classList.add('show');
    Arcade.logRun('dino', score, difficulty);
    if (score >= 300) Arcade.unlock('dino_300', 'Marathon Runner', 'Score 300 in Dino Run');
    if (score >= 750) Arcade.unlock('dino_750', 'Prehistoric Legend', 'Score 750 in Dino Run');
  }

  let lastObstacleType = null, obstacleStreak = 0;

  function spawnObstacle(){
    const gh = groundH();
    const gy = groundY();
    const p = preset();
    const t = Math.min(1, distance / p.rampDist);
    const boulderUnlocked = distance > p.boulderUnlock;

    // The mix shifts gradually as a run goes on: crows get slightly more
    // common, and once boulders unlock they take a modest slice too.
    const boulderP = boulderUnlocked ? 0.14 : 0;
    const crowP = Math.min(0.55, 0.36 + p.crowBias + t*0.08);
    const thornP = Math.max(0.25, 1 - boulderP - crowP);

    const roll = Math.random();
    let type;
    if (roll < boulderP) type = 'boulder';
    else if (roll < boulderP + thornP) type = 'thorn';
    else type = 'crow';

    // Never let the same obstacle type spawn more than twice in a row —
    // keeps the mix feeling varied instead of drifting into long streaks
    // of one type as speed increases.
    if (type === lastObstacleType && obstacleStreak >= 2){
      const pool = ['thorn', 'crow'];
      if (boulderUnlocked) pool.push('boulder');
      const alt = pool.filter(x => x !== type);
      type = alt[Math.floor(Math.random()*alt.length)];
    }
    obstacleStreak = (type === lastObstacleType) ? obstacleStreak + 1 : 1;
    lastObstacleType = type;

    if (type === 'thorn'){
      // ground thorn cluster (cactus-style, matches pipe gold-trim styling)
      const count = 1 + Math.floor(Math.random()*3);
      const segW = Math.max(11, W*0.022);
      const segH = Math.max(22, H*0.15) * (0.75 + Math.random()*0.4);
      obstacles.push({
        type:'thorn', x: W + segW, count, segW,
        h: segH, w: segW*count*0.72 + segW*0.6,
        y: gy
      });
    } else if (type === 'boulder'){
      // a rolling stone — the newer, tougher obstacle that only shows up
      // once a run has gone on for a while
      const r = Math.max(16, H*0.10) * (0.85 + Math.random()*0.3);
      obstacles.push({ type:'boulder', x: W + r, y: gy - r, size: r*2, rot: 0 });
    } else {
      // flying obstacle (small dark crow), at one of three heights
      const level = Math.floor(Math.random()*3);
      const size = Math.max(18, H*0.115);
      let cy;
      if (level === 0) cy = gy - size*1.1;                  // low: must jump
      else if (level === 1) cy = gy - size*2.35;             // mid: must duck
      else cy = gy - size*3.6;                                // high: safe
      obstacles.push({ type:'crow', x: W + size, y: cy, size, wing:0 });
    }
  }

  function roundRect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  function getObstacleGradient(w){
    if (_pipeGradCache && _pipeGradW === w) return _pipeGradCache;
    const grad = ctx.createLinearGradient(0,0,w,0);
    grad.addColorStop(0, '#1a1712');
    grad.addColorStop(0.5, '#232019');
    grad.addColorStop(1, '#1a1712');
    _pipeGradCache = grad;
    _pipeGradW = w;
    return grad;
  }

  function drawThorn(o){
    const gy = groundY();
    const grad = getObstacleGradient(o.w);
    ctx.save();
    ctx.translate(o.x, 0);
    for (let i=0;i<o.count;i++){
      const sw = o.segW * (i === Math.floor(o.count/2) ? 1 : 0.72);
      const sh = o.h * (i === Math.floor(o.count/2) ? 1 : 0.72);
      const sx = i * o.segW * 0.95;
      ctx.fillStyle = grad;
      roundRect(sx, gy - sh, sw, sh, sw*0.45);
      ctx.fill();
      ctx.strokeStyle = GOLD; ctx.lineWidth = 1.3;
      ctx.stroke();
      // rounded saguaro-style arm — a smooth stub curving out and up,
      // no pointed triangle silhouette
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(sx, gy - sh*0.66);
      ctx.quadraticCurveTo(sx - sw*0.95, gy - sh*0.70, sx - sw*0.92, gy - sh*0.86);
      ctx.quadraticCurveTo(sx - sw*0.90, gy - sh*1.02, sx - sw*0.55, gy - sh*1.0);
      ctx.quadraticCurveTo(sx - sw*0.30, gy - sh*0.92, sx - sw*0.12, gy - sh*0.74);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = GOLD; ctx.lineWidth = 1.1;
      ctx.stroke();
      // faint vertical rib lines for cactus texture
      ctx.strokeStyle = 'rgba(200,151,58,0.28)'; ctx.lineWidth = 1;
      for (let rib=1; rib<3; rib++){
        const rx = sx + sw*(rib/3);
        ctx.beginPath();
        ctx.moveTo(rx, gy - sh*0.92);
        ctx.lineTo(rx, gy - sh*0.08);
        ctx.stroke();
      }
    }
    ctx.restore();
  }

  function drawCrow(o){
    const s = o.size;
    o.wing += 0.35;
    const flap = Math.sin(o.wing);
    ctx.save();
    ctx.translate(o.x, o.y);
    ctx.fillStyle = '#1f1c17';
    ctx.strokeStyle = GOLD_DARK;
    ctx.lineWidth = Math.max(1, s*0.025);

    // tail feathers
    ctx.beginPath();
    ctx.moveTo(-s*0.28, -s*0.02);
    ctx.lineTo(-s*0.56, -s*0.11);
    ctx.lineTo(-s*0.46, 0);
    ctx.lineTo(-s*0.56, s*0.11);
    ctx.lineTo(-s*0.28, s*0.02);
    ctx.closePath();
    ctx.fill(); ctx.stroke();

    // body
    ctx.beginPath();
    ctx.ellipse(0, 0, s*0.30, s*0.20, 0, 0, Math.PI*2);
    ctx.fill(); ctx.stroke();

    // wings — a curved shape that flaps fully up and down (not a stiff V)
    function wing(dir){
      const tipY = -s*0.02 - flap*s*0.46;
      ctx.beginPath();
      ctx.moveTo(dir*s*0.06, -s*0.02);
      ctx.quadraticCurveTo(dir*s*0.36, tipY*0.55, dir*s*0.60, tipY);
      ctx.quadraticCurveTo(dir*s*0.32, s*0.04, dir*s*0.10, s*0.06);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
    }
    wing(-1); wing(1);

    // head
    const headCX = s*0.30, headCY = -s*0.11;
    ctx.beginPath();
    ctx.arc(headCX, headCY, s*0.15, 0, Math.PI*2);
    ctx.fill(); ctx.stroke();

    // beak
    ctx.fillStyle = '#e8683a';
    ctx.beginPath();
    ctx.moveTo(headCX + s*0.11, headCY - s*0.02);
    ctx.lineTo(headCX + s*0.28, headCY + s*0.01);
    ctx.lineTo(headCX + s*0.11, headCY + s*0.07);
    ctx.closePath();
    ctx.fill();

    // eye
    ctx.fillStyle = GOLD_LIGHT;
    ctx.beginPath();
    ctx.arc(headCX + s*0.04, headCY - s*0.04, s*0.035, 0, Math.PI*2);
    ctx.fill();

    ctx.restore();
  }

  function drawBoulder(o){
    const r = o.size*0.5;
    o.rot = (o.rot||0) + Math.max(0.02, currentSpeed()*0.045);
    ctx.save();
    ctx.translate(o.x, o.y);
    ctx.rotate(o.rot);
    const grad = ctx.createLinearGradient(-r,-r,r,r);
    grad.addColorStop(0, '#2a2620');
    grad.addColorStop(1, '#181510');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0,0,r,0,Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = GOLD_DARK; ctx.lineWidth = Math.max(1, r*0.09);
    ctx.stroke();
    // faint gold cracks/facets, rotating with the roll
    ctx.strokeStyle = 'rgba(200,151,58,0.45)';
    ctx.lineWidth = Math.max(1, r*0.05);
    for (let i=0;i<3;i++){
      const a = (i/3)*Math.PI*2;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a)*r*0.18, Math.sin(a)*r*0.18);
      ctx.lineTo(Math.cos(a)*r*0.85, Math.sin(a)*r*0.85);
      ctx.stroke();
    }
    ctx.restore();
  }

  // Smooth rolling hill silhouette — pure curves, no straight edges or
  // triangles, drawn as a soft double-sine ridge and filled to the ground.
  function drawHillLayer(offset, baseY, amp, color, wavelength){
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(-10, baseY + amp);
    const step = 16;
    for (let x = -10; x <= W + 10; x += step){
      const y = baseY - Math.sin((x + offset) / wavelength) * amp
                       - Math.sin((x + offset) * 0.55 / wavelength + 1.3) * amp * 0.35;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(W + 10, baseY + amp);
    ctx.closePath();
    ctx.fill();
  }

  function drawObstacle(o){
    if (o.type === 'thorn') drawThorn(o);
    else if (o.type === 'boulder') drawBoulder(o);
    else drawCrow(o);
  }

  function getDinoGradient(s){
    if (_birdGradCache && _birdGradSize === s) return _birdGradCache;
    const grad = ctx.createLinearGradient(-s*0.5, -s*0.5, s*0.5, s*0.5);
    grad.addColorStop(0, GOLD_LIGHT);
    grad.addColorStop(1, GOLD);
    _birdGradCache = grad;
    _birdGradSize = s;
    return grad;
  }

  // Draws the T-Rex body (torso, tail, arm, head+jaw, legs) in local space
  // where (0,0) is the foot/ground-contact line and negative-y is "up".
  // Kept as its own function so the duck pose can reuse it under a squash
  // transform instead of duplicating the geometry.
  function drawDinoBody(s, grad, legPhase, onGround){
    const legLen = s*0.30;
    const hipY = -legLen;
    const bodyR = s*0.32;
    const bodyCY = hipY - bodyR*0.85;
    const strokeCol = 'rgba(12,12,11,0.4)';

    // tail — a simple curled shape behind the body, classic cartoon-dino cue
    ctx.fillStyle = GOLD_DARK;
    ctx.beginPath();
    ctx.moveTo(-bodyR*0.55, bodyCY - bodyR*0.15);
    ctx.quadraticCurveTo(-bodyR*1.75, bodyCY + bodyR*0.10, -bodyR*1.55, bodyCY - bodyR*0.55);
    ctx.quadraticCurveTo(-bodyR*1.25, bodyCY - bodyR*0.18, -bodyR*0.35, bodyCY + bodyR*0.10);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = strokeCol; ctx.lineWidth = Math.max(1, s*0.015);
    ctx.stroke();

    // legs — thick and stubby (single segment) so they stay legible at small size
    function drawLeg(hipX, phase, airborne){
      let footX, footY;
      if (airborne){
        footX = hipX + s*0.04; footY = hipY*0.28;
      } else {
        const swing = Math.sin(phase);
        const lift = Math.max(0, swing);
        footX = hipX + swing*s*0.12;
        footY = -lift*s*0.11;
      }
      ctx.strokeStyle = GOLD_DARK; ctx.lineCap = 'round';
      ctx.lineWidth = Math.max(5, s*0.17);
      ctx.beginPath();
      ctx.moveTo(hipX, hipY*0.45);
      ctx.lineTo(footX, footY);
      ctx.stroke();
      if (!airborne){
        ctx.fillStyle = GOLD_DARK;
        for (let c=-1;c<=1;c++){
          ctx.beginPath();
          ctx.moveTo(footX, footY);
          ctx.lineTo(footX + s*0.085 + c*s*0.02, footY + s*0.015);
          ctx.lineTo(footX + c*s*0.045, footY + s*0.05);
          ctx.closePath();
          ctx.fill();
        }
      }
    }
    if (onGround){
      drawLeg(-s*0.11, legPhase, false);
      drawLeg(s*0.11, legPhase + Math.PI, false);
    } else {
      drawLeg(-s*0.08, 0, true);
      drawLeg(s*0.08, 0, true);
    }

    // body
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(0, bodyCY, bodyR, bodyR*0.86, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = strokeCol; ctx.lineWidth = Math.max(1, s*0.02);
    ctx.stroke();

    // subtle scale texture — a few darker flecks so the skin doesn't read
    // as flat cartoon color
    ctx.fillStyle = 'rgba(12,12,11,0.14)';
    const speckles = [[-0.10,-0.25],[0.12,-0.05],[-0.22,0.10],[0.05,0.30]];
    for (const [sx, sy] of speckles){
      ctx.beginPath();
      ctx.ellipse(sx*bodyR*1.6, bodyCY + sy*bodyR*1.6, bodyR*0.11, bodyR*0.07, 0.4, 0, Math.PI*2);
      ctx.fill();
    }

    // belly highlight
    ctx.fillStyle = 'rgba(240,237,230,0.16)';
    ctx.beginPath();
    ctx.ellipse(-bodyR*0.12, bodyCY + bodyR*0.28, bodyR*0.55, bodyR*0.36, 0, 0, Math.PI*2);
    ctx.fill();

    // dorsal ridge — small rounded scutes along the spine, a classic
    // real-dinosaur cue (never pointed/triangular, just soft bumps)
    ctx.fillStyle = GOLD_DARK;
    const ridgeSpots = [[-0.42,-0.62],[-0.12,-0.80],[0.20,-0.78],[0.50,-0.58]];
    for (const [rx, ry] of ridgeSpots){
      ctx.beginPath();
      ctx.ellipse(rx*bodyR, bodyCY + ry*bodyR, bodyR*0.11, bodyR*0.15, -0.3, 0, Math.PI*2);
      ctx.fill();
    }

    // small arm
    ctx.strokeStyle = GOLD_DARK; ctx.lineCap = 'round';
    ctx.lineWidth = Math.max(2, s*0.055);
    ctx.beginPath();
    ctx.moveTo(bodyR*0.55, bodyCY + bodyR*0.32);
    ctx.lineTo(bodyR*0.90, bodyCY + bodyR*0.50);
    ctx.stroke();

    // neck — closes the gap between body and head so it doesn't look stuck on
    const headR = s*0.28;
    const headCX = bodyR*0.80, headCY = bodyCY - bodyR*0.62;
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(bodyR*0.35, bodyCY - bodyR*0.55);
    ctx.lineTo(headCX - headR*0.35, headCY + headR*0.55);
    ctx.lineTo(headCX + headR*0.25, headCY + headR*0.60);
    ctx.lineTo(bodyR*0.68, bodyCY - bodyR*0.30);
    ctx.closePath();
    ctx.fill();

    // head — slightly elongated snout rather than a perfect circle, for a
    // less "cute", more predatory silhouette while still staying legible
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(headCX, headCY, headR*1.12, headR*0.95, -0.12, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = strokeCol; ctx.lineWidth = Math.max(1, s*0.02);
    ctx.stroke();

    // open jaw
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(headCX + headR*0.10, headCY + headR*0.25);
    ctx.lineTo(headCX + headR*1.55, headCY + headR*0.30);
    ctx.lineTo(headCX + headR*1.35, headCY + headR*0.82);
    ctx.lineTo(headCX - headR*0.05, headCY + headR*0.62);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = 'rgba(12,12,11,0.32)'; ctx.lineWidth = Math.max(1, s*0.015);
    ctx.stroke();

    // teeth
    ctx.fillStyle = 'rgba(240,237,230,0.9)';
    for (let i=0;i<3;i++){
      const tx = headCX + headR*0.25 + i*headR*0.38;
      ctx.beginPath();
      ctx.moveTo(tx, headCY + headR*0.32);
      ctx.lineTo(tx + headR*0.14, headCY + headR*0.32);
      ctx.lineTo(tx + headR*0.07, headCY + headR*0.55);
      ctx.closePath();
      ctx.fill();
    }

    // eye
    ctx.fillStyle = '#0c0c0b';
    ctx.beginPath();
    ctx.arc(headCX + headR*0.15, headCY - headR*0.20, s*0.055, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.beginPath();
    ctx.arc(headCX + headR*0.11, headCY - headR*0.26, s*0.02, 0, Math.PI*2);
    ctx.fill();

    // brow ridge — a short, slightly heavy stroke above the eye gives a
    // more alert, predatory read instead of a flat cartoon dot-eye
    ctx.strokeStyle = GOLD_DARK; ctx.lineCap = 'round';
    ctx.lineWidth = Math.max(1.5, s*0.035);
    ctx.beginPath();
    ctx.moveTo(headCX - headR*0.02, headCY - headR*0.42);
    ctx.lineTo(headCX + headR*0.34, headCY - headR*0.36);
    ctx.stroke();
  }

  function drawDino(){
    const s = dino.size;

    dino.wingKick *= 0.90;
    const running = dino.onGround && !dino.ducking && state === 'playing';
    if (running) dino.legPhase += 0.34 * (currentSpeed()/baseSpeed());
    const grad = getDinoGradient(s);

    ctx.save();
    ctx.translate(dino.x, dino.y);
    if (dino.ducking){
      // Squash-and-stretch the same silhouette into a low running crouch
      // instead of drawing a second, separate body.
      ctx.save();
      ctx.scale(1.45, 0.56);
      drawDinoBody(s, grad, dino.legPhase, true);
      ctx.restore();
    } else {
      drawDinoBody(s, grad, dino.legPhase, dino.onGround);
    }
    ctx.restore();
  }

  function hitboxForDino(){
    const gy = groundY();
    if (dino.ducking){
      return { cx: dino.x, cy: gy - dino.duckH*0.5, rx: dino.size*0.42, ry: dino.duckH*0.42 };
    }
    return { cx: dino.x, cy: dino.y - dino.standH*0.5, rx: dino.size*0.30, ry: dino.standH*0.42 };
  }

  function update(){
    frame++;

    if (state === 'playing'){
      const g = gravity();
      const speed = currentSpeed();
      const gy = groundY();

      distance += speed;
      score = Math.floor(distance / 26);
      document.getElementById('score').textContent = score;

      if (!dino.onGround){
        dino.vy += g;
        dino.y += dino.vy;
        if (dino.y >= gy){
          dino.y = gy;
          dino.vy = 0;
          dino.onGround = true;
        }
      } else {
        dino.y = gy;
      }

      frame >= nextSpawnFrame && (spawnObstacle(), nextSpawnFrame = frame + currentInterval());

      for (const o of obstacles) o.x -= speed;
      obstacles = obstacles.filter(o => o.x > -(o.w || o.size) - 40);

      const hb = hitboxForDino();
      for (const o of obstacles){
        if (o.type === 'thorn'){
          const ow = o.count * o.segW * 0.95 + o.segW*0.6;
          const oLeft = o.x, oRight = o.x + ow;
          const oTop = o.y - o.h, oBottom = o.y;
          if (hb.cx + hb.rx > oLeft && hb.cx - hb.rx < oRight &&
              hb.cy + hb.ry > oTop && hb.cy - hb.ry < oBottom){
            endGame();
          }
        } else {
          const dx = hb.cx - o.x, dy = hb.cy - o.y;
          const vf = (o.type === 'boulder') ? 0.48 : 0.28;
          const rx = hb.rx + o.size*0.5, ry = hb.ry + o.size*vf;
          if ((dx*dx)/(rx*rx) + (dy*dy)/(ry*ry) < 1){
            endGame();
          }
        }
      }

      groundOffset -= speed;
      hillOffset1 -= speed * 0.12;
      hillOffset2 -= speed * 0.30;
    } else {
      groundOffset -= 1.1;
      hillOffset1 -= 0.15;
      hillOffset2 -= 0.35;
    }
  }

  function draw(){
    const gh = groundH();
    const gy = groundY();

    ctx.save();
    if (shakeTime > 0){
      const dx = (Math.random()*2-1) * shakeMag;
      const dy = (Math.random()*2-1) * shakeMag * 0.6;
      ctx.translate(dx, dy);
      shakeTime--; shakeMag *= 0.88;
    }

    ctx.fillStyle = skyGradient;
    ctx.fillRect(-4,-4,W+8,H+8);

    for (const s of stars){
      ctx.fillStyle = s.color;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fill();
    }

    drawHillLayer(hillOffset1, gy - groundH()*0.15, Math.max(14, H*0.05), 'rgba(200,151,58,0.045)', 150);
    drawHillLayer(hillOffset2, gy - groundH()*0.05, Math.max(20, H*0.08), 'rgba(200,151,58,0.075)', 96);

    for (const o of obstacles) drawObstacle(o);

    ctx.fillStyle = '#141413';
    ctx.fillRect(0, gy, W, gh);
    ctx.strokeStyle = GOLD; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke();

    const tickGap = 26;
    let off = ((groundOffset % tickGap) + tickGap) % tickGap;
    ctx.strokeStyle = BORDER; ctx.lineWidth = 1;
    for (let x = -off; x < W; x += tickGap){
      ctx.beginPath();
      ctx.moveTo(x, gy+8);
      ctx.lineTo(x+12, gy+8);
      ctx.stroke();
    }

    if (dino) drawDino();
    ctx.restore();
  }

  // ---- Sound effects — thin wrappers around the shared Arcade audio engine ----
  function audioCtx(){ return Arcade.audioCtx(); }
  function tone(freq, dur, type, startGain, opts){ Arcade.tone(freq, dur, type, startGain, opts); }
  function sfxJump(){ tone(420, 0.14, 'triangle', 0.18, { sweepTo: 720 }); }
  function sfxDuck(){ tone(260, 0.08, 'triangle', 0.11, { sweepTo: 170 }); }
  let lastScoreTick = 0;
  function maybeScoreTick(){
    if (Math.floor(score/100) > lastScoreTick){
      lastScoreTick = Math.floor(score/100);
      tone(880, 0.10, 'sine', 0.16);
      setTimeout(()=> tone(1180, 0.12, 'sine', 0.14), 60);
      const scoreEl = document.getElementById('score');
      scoreEl.classList.remove('pulse'); void scoreEl.offsetWidth; scoreEl.classList.add('pulse');
    }
  }
  function sfxHit(){
    Arcade.noiseBurst(0.25, 0.22, 1200);
    tone(140, 0.2, 'sawtooth', 0.12, { sweepTo: 60 });
  }

  function loop(){
    update();
    if (state === 'playing') maybeScoreTick();
    draw();
    requestAnimationFrame(loop);
  }

  // Canvas needs to be focusable so keyboard input reliably reaches it
  // (some hosting contexts/iframes don't route key events to the window
  // unless a focusable element inside them has focus).
  canvas.setAttribute('tabindex', '0');
  canvas.style.outline = 'none';
  function focusCanvas(){ try { canvas.focus({ preventScroll:true }); } catch(e){} }
  focusCanvas();

  function handleKeyDown(e){
    if (e.code === 'Space' || e.key === ' ' || e.key === 'Spacebar' || e.code === 'ArrowUp' || e.key === 'ArrowUp' || Arcade.matchControl('dino', 'jump', e)){
      e.preventDefault();
      audioCtx();
      if (state === 'start') startGame();
      else jump();
    } else if (e.code === 'ArrowDown' || e.key === 'ArrowDown' || Arcade.matchControl('dino', 'duck', e)){
      e.preventDefault();
      setDuck(true);
    }
  }
  function handleKeyUp(e){
    if (e.code === 'ArrowDown' || e.key === 'ArrowDown' || Arcade.matchControl('dino', 'duck', e)){
      e.preventDefault();
      setDuck(false);
    }
  }
  window.addEventListener('keydown', handleKeyDown);
  document.addEventListener('keydown', handleKeyDown);
  window.addEventListener('keyup', handleKeyUp);
  document.addEventListener('keyup', handleKeyUp);

  // Pointer / touch: tap-hold below a threshold = duck, quick tap = jump, swipe down = duck
  let pointerStartY = 0, pointerDown = false, duckByPointer = false;
  function onPointerDown(e){
    e.preventDefault();
    focusCanvas();
    audioCtx();
    pointerStartY = (e.touches ? e.touches[0].clientY : e.clientY);
    pointerDown = true;
    duckByPointer = false;
    jump();
  }
  function onPointerMove(e){
    if (!pointerDown || state !== 'playing') return;
    const y = (e.touches ? e.touches[0].clientY : e.clientY);
    if (y - pointerStartY > 28 && !duckByPointer){
      duckByPointer = true;
      setDuck(true);
    }
  }
  function onPointerUp(e){
    pointerDown = false;
    if (duckByPointer){ setDuck(false); duckByPointer = false; }
  }
  canvas.addEventListener('pointerdown', onPointerDown, { passive:false });
  canvas.addEventListener('pointermove', onPointerMove, { passive:false });
  window.addEventListener('pointerup', onPointerUp, { passive:false });
  document.getElementById('startOverlay').addEventListener('pointerdown', function(e){
    if (e.target.closest('.option-btn')) return;
    e.preventDefault();
  }, { passive:false });
  document.querySelectorAll('#startOverlay .option-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      focusCanvas();
      audioCtx();
      startGame(btn.getAttribute('data-diff'));
    });
  });
  document.getElementById('overOverlay').addEventListener('pointerdown', function(e){
    if (e.target.closest('#retryBtn') || e.target.closest('#homeBtn')) return;
    onPointerDown(e);
  }, { passive:false });
  document.getElementById('retryBtn').addEventListener('click', (e)=>{
    e.stopPropagation();
    focusCanvas();
    startGame();
  });
  document.getElementById('homeBtn').addEventListener('click', (e)=>{
    e.stopPropagation();
  });
  ['touchstart','touchend'].forEach(evt=>{
    canvas.addEventListener(evt, e => e.preventDefault(), { passive:false });
  });

  reset();
  loop();
  Arcade.mountPanels({ gameId: 'dino' });
})();

</script>
</body>
</html>
